<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Certificates — Academic Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="firebase-config.js"></script>
<script>if (!window.ENV) window.ENV = { FIREBASE_API_KEY: "__FIREBASE_API_KEY__", FIREBASE_AUTH_DOMAIN: "__FIREBASE_AUTH_DOMAIN__", FIREBASE_PROJECT_ID: "__FIREBASE_PROJECT_ID__", FIREBASE_STORAGE_BUCKET: "__FIREBASE_STORAGE_BUCKET__", FIREBASE_MESSAGING_SENDER_ID: "__FIREBASE_MESSAGING_SENDER_ID__", FIREBASE_APP_ID: "__FIREBASE_APP_ID__" };</script>
<style>
:root{--ink:#1c1c2e;--ink-2:#44445a;--ink-3:#8888a8;--paper:#f7f6f3;--white:#fff;--border:#e0ddd6;--accent:#0d9488;--accent-2:#ccfbf1;--shadow-sm:0 1px 4px rgba(28,28,46,.07);--shadow:0 3px 14px rgba(28,28,46,.10);--shadow-lg:0 10px 40px rgba(28,28,46,.16);--radius:10px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;padding-top:62px;}
.page-topbar{background:#0f1e1a;border-bottom:2px solid var(--accent);position:sticky;top:62px;z-index:90;height:54px;display:flex;align-items:center;padding:0 24px;gap:14px;}
.topbar-back{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;transition:color .15s;}
.topbar-back:hover{color:#fff;}
.topbar-back svg{width:14px;height:14px;}
.topbar-sep{color:rgba(255,255,255,.25);}
.topbar-title{font-size:14px;font-weight:700;color:#fff;}
.page-wrap{max-width:1000px;margin:0 auto;padding:32px 20px 100px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
.stat-num{font-size:28px;font-weight:800;color:var(--ink);line-height:1;margin-bottom:4px;}
.stat-label{font-size:12px;color:var(--ink-3);}
.section-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-title svg{width:18px;height:18px;color:var(--accent);}
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;margin-bottom:40px;}
.cert-card{background:var(--white);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s;}
.cert-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);}
.cert-card-banner{height:80px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.cert-card-banner::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--banner-from,#0f1e1a) 0%,var(--banner-to,#071814) 100%);}
.cert-card-banner .banner-icon{position:relative;z-index:1;font-size:30px;}
.cert-card-body{padding:18px 18px 14px;}
.cert-domain-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.cert-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.cert-meta{font-size:12px;color:var(--ink-3);margin-bottom:10px;}
.cert-verify-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-3);background:var(--paper);border-radius:6px;padding:4px 8px;display:inline-block;margin-bottom:12px;letter-spacing:.04em;}
.cert-card-actions{display:flex;gap:8px;}
.cert-btn{flex:1;padding:9px 0;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none;}
.cert-btn-primary{background:var(--accent);border:none;color:#fff;}
.cert-btn-primary:hover{background:#0f766e;}
.cert-btn-secondary{background:var(--paper);border:1px solid var(--border);color:var(--ink);}
.cert-btn-secondary:hover{background:var(--border);}
.domain-progress-list{display:flex;flex-direction:column;gap:10px;margin-bottom:36px;}
.dp-row{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);}
.dp-icon{font-size:20px;}
.dp-name{font-size:13px;font-weight:700;color:var(--ink);flex:1;}
.dp-bar-wrap{flex:2;}
.dp-bar{height:7px;background:var(--border);border-radius:6px;overflow:hidden;}
.dp-fill{height:100%;border-radius:6px;transition:width .4s;}
.dp-pct{font-size:12px;font-weight:700;color:var(--ink-2);width:38px;text-align:right;}
.dp-badge{padding:4px 10px;border-radius:50px;font-size:11px;font-weight:700;flex-shrink:0;}
.dp-badge.complete{background:#dcfce7;color:#15803d;}
.dp-badge.in-progress{background:#ccfbf1;color:#0f766e;}
.dp-badge.not-started{background:#f1f5f9;color:#64748b;}
.cert-modal-overlay{position:fixed;inset:0;background:rgba(10,10,30,.7);z-index:900;display:none;align-items:center;justify-content:center;padding:20px;}
.cert-modal-overlay.open{display:flex;}
.cert-modal{background:#fff;border-radius:20px;width:100%;max-width:520px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:certIn .25s ease;}
@keyframes certIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.cert-preview{padding:36px 36px 24px;background:linear-gradient(135deg,#0f1e1a 0%,#0e3530 60%,#071814 100%);text-align:center;position:relative;}
.cert-preview::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 15% 75%,rgba(13,148,136,0.25) 0%,transparent 50%),radial-gradient(circle at 85% 20%,rgba(20,184,166,0.18) 0%,transparent 48%);}
.cert-preview-inner{position:relative;z-index:1;}
.cert-preview-emblem{font-size:40px;margin-bottom:8px;}
.cert-preview-org{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:14px;}
.cert-preview-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;}
.cert-preview-domain{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:16px;}
.cert-preview-name{font-size:19px;font-weight:800;color:#fff;border-top:1px solid rgba(255,255,255,.15);padding-top:14px;margin-bottom:4px;}
.cert-preview-date{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:14px;}
.cert-preview-id{font-family:'DM Mono',monospace;font-size:10.5px;color:rgba(255,255,255,.3);letter-spacing:.06em;}
.cert-modal-footer{padding:18px 24px;display:flex;gap:10px;border-top:1px solid var(--border);}
.cert-modal-close{padding:9px 20px;border-radius:9px;border:1px solid var(--border);background:var(--paper);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.empty-state{text-align:center;padding:52px 20px;background:var(--white);border:1px dashed var(--border);border-radius:18px;margin-bottom:32px;}
.empty-icon{font-size:42px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--ink-3);margin-bottom:18px;}
.empty-cta{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:11px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;text-decoration:none;transition:all .18s;}
.empty-cta:hover{background:#0f766e;transform:translateY(-1px);}
.skel{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
<script type="module" src="auth-guard.js"></script>
</head>
<body>
<div id="navbar-container"></div>
<div class="page-topbar">
  <a href="CompetencyFramework.html" class="topbar-back">
    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
    Framework
  </a>
  <span class="topbar-sep">/</span>
  <span class="topbar-title">My Certificates</span>
</div>
<div class="page-wrap">
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="skel" style="height:40px;"></div></div>
    <div class="stat-card"><div class="skel" style="height:40px;"></div></div>
    <div class="stat-card"><div class="skel" style="height:40px;"></div></div>
  </div>
  <div class="section-title">
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a7 7 0 100 14A7 7 0 009 2zm2 10H7v-1.5l3-1.5V7h2v3.5l-1 .5V12z"/></svg>
    Earned Certificates
  </div>
  <div class="cert-grid" id="certGrid"><div class="skel" style="height:220px;border-radius:18px;"></div></div>
  <div class="section-title">
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 10a8 8 0 1116 0A8 8 0 012 10zm9-3a1 1 0 10-2 0v3a1 1 0 00.293.707l2 2a1 1 0 001.414-1.414L11 9.586V7z"/></svg>
    Domain Progress Towards Certification
  </div>
  <div class="domain-progress-list" id="domainProgressList">
    <div class="skel" style="height:56px;border-radius:12px;margin-bottom:8px;"></div>
    <div class="skel" style="height:56px;border-radius:12px;"></div>
  </div>
</div>

<div class="cert-modal-overlay" id="certModal">
  <div class="cert-modal">
    <div class="cert-preview">
      <div class="cert-preview-inner">
        <div class="cert-preview-emblem" id="cModalIcon">🎓</div>
        <div class="cert-preview-org">Eduversal · Academic Hub</div>
        <div class="cert-preview-title">Certificate of Leadership Competency</div>
        <div class="cert-preview-domain" id="cModalDomain"></div>
        <div class="cert-preview-name" id="cModalName"></div>
        <div class="cert-preview-date" id="cModalDate"></div>
        <div class="cert-preview-id" id="cModalId"></div>
      </div>
    </div>
    <div class="cert-modal-footer"><button class="cert-modal-close" onclick="closeCertModal()">Close</button></div>
  </div>
</div>

<script type="module">
import { collection, doc, getDoc, getDocs, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
const FRAMEWORK=[
  {id:'data-leadership',name:'Data-Driven Leadership',icon:'📊',color:'#0d9488',bannerFrom:'#0f1e1a',bannerTo:'#071814',comps:['dl-1','dl-2','dl-3','dl-4']},
  {id:'curriculum-oversight',name:'Curriculum Oversight & Quality',icon:'📚',color:'#2563eb',bannerFrom:'#0a1e3c',bannerTo:'#060d1e',comps:['co-1','co-2','co-3','co-4']},
  {id:'staff-development',name:'Staff Development & Appraisal',icon:'🌱',color:'#16a34a',bannerFrom:'#0a2e1a',bannerTo:'#06180e',comps:['sd-1','sd-2','sd-3','sd-4']},
  {id:'strategic-planning',name:'Strategic Planning & Improvement',icon:'🎯',color:'#d97706',bannerFrom:'#2e1a0a',bannerTo:'#180e06',comps:['sp-1','sp-2','sp-3','sp-4']},
  {id:'accreditation',name:'Accreditation & Compliance',icon:'🏅',color:'#7c3aed',bannerFrom:'#1e0a3c',bannerTo:'#0c0820',comps:['ac-1','ac-2','ac-3','ac-4']},
  {id:'student-outcomes',name:'Student Outcomes & Wellbeing',icon:'🎓',color:'#e11d48',bannerFrom:'#2e0a14',bannerTo:'#18060a',comps:['so-1','so-2','so-3','so-4']},
];
let uid='',userName='',earned={},myCerts=[];

document.addEventListener('authReady',async({detail:{user,profile}})=>{
  uid=user.uid;userName=profile?.displayName||user.displayName||'Administrator';
  const snap=await getDoc(doc(window.db,'user_competencies',uid));
  if(snap.exists())earned=snap.data().earned_academic||{};
  const certQ=query(collection(window.db,'competency_certificates'),where('uid','==',uid),where('platform','==','academic'),orderBy('issuedAt','desc'));
  const certSnap=await getDocs(certQ);
  myCerts=certSnap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

function isLeadOnAll(comps){return comps.every(c=>earned[c]?.level==='lead');}
function getEarned(comps){return comps.filter(c=>earned[c]?.level).length;}

function render(){
  const totalCerts=myCerts.length;
  let total=0,earnedCount=0;
  FRAMEWORK.forEach(d=>{d.comps.forEach(c=>{total++;if(earned[c]?.level)earnedCount++;});});
  const domainsComplete=FRAMEWORK.filter(d=>isLeadOnAll(d.comps)).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-num">${totalCerts}</div><div class="stat-label">Certificates Issued</div></div>
    <div class="stat-card"><div class="stat-num">${earnedCount}</div><div class="stat-label">Competencies Earned</div></div>
    <div class="stat-card"><div class="stat-num">${domainsComplete}</div><div class="stat-label">Domains Mastered</div></div>
    <div class="stat-card"><div class="stat-num">${total-earnedCount}</div><div class="stat-label">Still to Earn</div></div>`;
  const grid=document.getElementById('certGrid');
  if(!myCerts.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎓</div><div class="empty-title">No certificates yet</div><div class="empty-sub">Complete all competencies in a domain at Lead level to earn your certificate.</div><a href="LearningPath.html" class="empty-cta">Start My Learning Path</a></div>`;
  }else{
    grid.innerHTML=myCerts.map(cert=>{
      const d=FRAMEWORK.find(f=>f.id===cert.domainId)||{};
      const date=cert.issuedAt?.toDate?.()?.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})||'';
      return `<div class="cert-card"><div class="cert-card-banner" style="--banner-from:${d.bannerFrom||'#0f1e1a'};--banner-to:${d.bannerTo||'#071814'}"><div class="banner-icon">${d.icon||'🎓'}</div></div><div class="cert-card-body"><div class="cert-domain-tag" style="color:${d.color||'var(--accent)'};">${d.name||cert.domainName}</div><div class="cert-name">Certificate of Leadership Competency</div><div class="cert-meta">Issued ${date}</div><div class="cert-verify-id">${cert.id.substring(0,8).toUpperCase()}</div><div class="cert-card-actions"><button class="cert-btn cert-btn-primary" onclick='showCert(${JSON.stringify(cert)},${JSON.stringify(d)})'>🎓 View</button></div></div></div>`;
    }).join('');
  }
  document.getElementById('domainProgressList').innerHTML=FRAMEWORK.map(d=>{
    const de=getEarned(d.comps),t=d.comps.length,pct=Math.round(de/t*100);
    const isC=isLeadOnAll(d.comps),hasA=de>0;
    return `<div class="dp-row"><div class="dp-icon">${d.icon}</div><div class="dp-name">${d.name}</div><div class="dp-bar-wrap"><div class="dp-bar"><div class="dp-fill" style="width:${pct}%;background:${d.color};"></div></div></div><div class="dp-pct">${pct}%</div><span class="dp-badge ${isC?'complete':hasA?'in-progress':'not-started'}">${isC?'✓ Certified':hasA?'In Progress':'Not Started'}</span></div>`;
  }).join('');
}

window.showCert=function(cert,d){
  document.getElementById('cModalIcon').textContent=d.icon||'🎓';
  document.getElementById('cModalDomain').textContent=d.name||cert.domainName;
  document.getElementById('cModalName').textContent=userName;
  const date=cert.issuedAt?.toDate?.()?.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})||'';
  document.getElementById('cModalDate').textContent='Issued '+date;
  document.getElementById('cModalId').textContent='CERT-'+cert.id.substring(0,8).toUpperCase();
  document.getElementById('certModal').classList.add('open');
};
window.closeCertModal=function(){document.getElementById('certModal').classList.remove('open');};
document.getElementById('certModal').addEventListener('click',e=>{if(e.target===document.getElementById('certModal'))closeCertModal();});
</script>
</body>
</html>
