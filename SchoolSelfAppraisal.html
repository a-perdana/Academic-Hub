<style>
:root {
  --ink:#1c1c2e; --ink-2:#44445a; --ink-3:#8888a8;
  --paper:#f7f6f3; --paper-2:#eeece8; --white:#ffffff; --border:#e0ddd6;
  --accent:#b45309; --accent-2:#fef3c7; --accent-dk:#92400e;
  --d1:#1e40af; --d1-bg:#dbeafe;
  --d2:#065f46; --d2-bg:#d1fae5;
  --d3:#7c2d12; --d3-bg:#ffedd5;
  --d4:#4338ca; --d4-bg:#ede9fe;
  --d5:#0f766e; --d5-bg:#ccfbf1;
  --shadow-sm:0 1px 4px rgba(28,28,46,.07);
  --shadow:0 3px 14px rgba(28,28,46,.10);
  --radius:10px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; font-size:14px; padding-top:62px; }

/* ===== TOPBAR ===== */
.page-topbar {
  background:#1c1005; border-bottom:2px solid var(--accent);
  position:sticky; top:62px; z-index:90; height:54px;
  display:flex; align-items:center; padding:0 24px; gap:14px;
}
.topbar-back {
  display:flex; align-items:center; gap:6px;
  font-size:12px; color:rgba(255,255,255,.5); text-decoration:none; transition:color .15s;
}
.topbar-back:hover { color:#fff; }
.topbar-sep { color:rgba(255,255,255,.25); }
.topbar-title { font-size:14px; font-weight:700; color:#fff; }
.topbar-status {
  margin-left:auto; font-size:12px; font-weight:600;
  padding:3px 10px; border-radius:99px;
}
.ts-draft    { background:rgba(255,255,255,.1); color:rgba(255,255,255,.6); }
.ts-submitted{ background:#fef3c7; color:#92400e; }
.ts-reviewed { background:#d1fae5; color:#065f46; }

/* ===== LAYOUT ===== */
.page-body { display:flex; min-height:calc(100vh - 116px); }

/* ===== SIDEBAR (domain nav) ===== */
.domain-sidebar {
  width:220px; flex-shrink:0;
  position:sticky; top:116px; height:calc(100vh - 116px);
  overflow-y:auto; background:var(--white);
  border-right:1px solid var(--border);
  padding:20px 12px;
}
.sidebar-section-label {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.1em; color:var(--ink-3); padding:4px 8px 8px;
}
.domain-nav-btn {
  width:100%; padding:9px 10px; border-radius:8px;
  font-size:13px; cursor:pointer; border:none;
  text-align:left; background:transparent; color:var(--ink-2);
  display:flex; align-items:center; gap:8px;
  margin-bottom:2px; font-family:inherit; transition:all .15s;
}
.domain-nav-btn:hover { background:var(--paper); color:var(--ink); }
.domain-nav-btn.active { font-weight:700; }
.domain-nav-btn .dnb-icon { font-size:15px; flex-shrink:0; }
.domain-nav-btn .dnb-label { flex:1; line-height:1.3; }
.domain-nav-btn .dnb-score {
  font-size:11px; font-weight:700; padding:2px 7px;
  border-radius:99px; flex-shrink:0;
}
.nav-divider { height:1px; background:var(--border); margin:10px 8px; }
.overview-nav-btn {
  width:100%; padding:9px 10px; border-radius:8px;
  font-size:13px; font-weight:500; cursor:pointer; border:none;
  text-align:left; background:transparent; color:var(--ink-2);
  display:block; margin-bottom:2px; font-family:inherit; transition:all .15s;
}
.overview-nav-btn:hover { background:var(--paper); color:var(--ink); }
.overview-nav-btn.active { background:var(--accent-2); color:var(--accent-dk); font-weight:700; }

@media (max-width:900px) { .domain-sidebar { display:none; } }

/* ===== MAIN CONTENT ===== */
.page-main { flex:1; padding:32px 28px 100px; min-width:0; max-width:820px; }
@media (max-width:768px) { .page-main { padding:24px 16px 80px; } }

/* ===== OVERVIEW PANEL ===== */
.overview-hero {
  background:linear-gradient(135deg,#78350f,#b45309,#d97706);
  border-radius:16px; padding:28px; color:#fff; margin-bottom:24px;
}
.oh-eyebrow { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.6); margin-bottom:8px; }
.oh-title { font-family:'Lora',serif; font-size:1.7rem; font-weight:600; margin-bottom:6px; line-height:1.2; }
.oh-sub { font-size:13px; color:rgba(255,255,255,.7); line-height:1.55; }
.oh-score-row { display:flex; gap:16px; margin-top:20px; flex-wrap:wrap; }
.oh-score-chip {
  background:rgba(255,255,255,.15); border-radius:10px;
  padding:12px 18px; text-align:center; min-width:90px;
}
.oh-score-val { font-size:1.8rem; font-weight:800; line-height:1; }
.oh-score-label { font-size:11px; color:rgba(255,255,255,.65); margin-top:3px; }

.domain-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; margin-bottom:24px; }
.domain-card {
  background:var(--white); border:1px solid var(--border);
  border-radius:12px; padding:16px; cursor:pointer;
  transition:box-shadow .15s, transform .15s;
}
.domain-card:hover { box-shadow:var(--shadow); transform:translateY(-2px); }
.dc-code { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
.dc-title { font-size:13px; font-weight:600; line-height:1.35; margin-bottom:12px; }
.dc-score-row { display:flex; align-items:center; gap:8px; }
.dc-score-bar { flex:1; height:5px; background:var(--paper-2); border-radius:3px; overflow:hidden; }
.dc-score-fill { height:100%; border-radius:3px; transition:width .4s ease; }
.dc-score-num { font-size:12px; font-weight:700; min-width:24px; text-align:right; }
.dc-completion { font-size:11px; color:var(--ink-3); margin-top:6px; }

.overview-fields { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
@media (max-width:600px) { .overview-fields { grid-template-columns:1fr; } }
.field-block label { display:block; font-size:11px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.field-block textarea {
  width:100%; min-height:90px; padding:10px 12px;
  border:1.5px solid var(--border); border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink);
  resize:vertical; background:var(--white); line-height:1.55;
  transition:border-color .15s;
}
.field-block textarea:focus { outline:none; border-color:var(--accent); background:#fffdf8; }
.field-block textarea:disabled { opacity:.6; background:var(--paper); }

/* ===== DOMAIN PANEL ===== */
.domain-header {
  display:flex; align-items:center; gap:14px;
  padding:18px 20px; border-radius:14px; margin-bottom:22px;
}
.dh-icon { font-size:1.8rem; }
.dh-code { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; margin-bottom:4px; }
.dh-title { font-family:'Lora',serif; font-size:1.15rem; font-weight:600; line-height:1.25; }
.dh-desc { font-size:12.5px; color:var(--ink-2); margin-top:4px; line-height:1.55; }

/* ===== ASPECT CARD ===== */
.aspect-card {
  background:var(--white); border:1px solid var(--border);
  border-radius:12px; margin-bottom:16px; overflow:hidden;
}
.aspect-head {
  padding:14px 18px; background:var(--paper);
  border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
}
.aspect-num { font-size:10px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; }
.aspect-title { font-size:14px; font-weight:700; color:var(--ink); }
.aspect-desc { font-size:12px; color:var(--ink-2); margin-top:4px; line-height:1.55; }
.aspect-score-badge {
  font-size:11px; font-weight:700; padding:3px 10px;
  border-radius:99px; white-space:nowrap; flex-shrink:0; margin-top:2px;
}
.s0 { background:var(--paper-2); color:var(--ink-3); }
.s1 { background:#fee2e2; color:#991b1b; }
.s2 { background:#fef3c7; color:#92400e; }
.s3 { background:#d1fae5; color:#065f46; }
.s4 { background:#dbeafe; color:#1e40af; }

.aspect-body { padding:16px 18px; }

/* ===== EXPECTATIONS (collapsible) ===== */
.expectations-toggle {
  display:flex; align-items:center; gap:6px;
  font-size:11px; font-weight:700; color:var(--ink-3);
  text-transform:uppercase; letter-spacing:.05em;
  cursor:pointer; margin-bottom:10px; background:none;
  border:none; padding:0; font-family:inherit;
}
.expectations-toggle svg { transition:transform .2s; }
.expectations-toggle.open svg { transform:rotate(90deg); }
.expectations-list { display:none; padding:10px 12px; background:var(--paper); border-radius:8px; margin-bottom:14px; }
.expectations-list.open { display:block; }
.expectations-list li { font-size:12px; color:var(--ink-2); line-height:1.6; padding:3px 0; padding-left:14px; position:relative; }
.expectations-list li::before { content:'·'; position:absolute; left:4px; color:var(--ink-3); }

/* ===== RATING ===== */
.rating-label { font-size:11px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px; }
.rating-options { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.rating-btn {
  padding:8px 14px; border-radius:9px; font-size:12.5px; font-weight:600;
  border:1.5px solid var(--border); background:var(--white);
  cursor:pointer; transition:all .15s; color:var(--ink-2); font-family:inherit;
}
.rating-btn:hover { border-color:var(--accent); color:var(--accent-dk); }
.rating-btn:disabled { cursor:not-allowed; opacity:.5; }
.rating-btn.sel-1 { background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
.rating-btn.sel-2 { background:#fef3c7; border-color:#fcd34d; color:#92400e; }
.rating-btn.sel-3 { background:#d1fae5; border-color:#6ee7b7; color:#065f46; }
.rating-btn.sel-4 { background:#dbeafe; border-color:#93c5fd; color:#1e40af; }

/* ===== EVIDENCE ===== */
.evidence-label { font-size:11px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.evidence-textarea {
  width:100%; min-height:80px; padding:10px 12px;
  border:1.5px solid var(--border); border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink);
  resize:vertical; background:var(--white); line-height:1.55; transition:border-color .15s;
}
.evidence-textarea:focus { outline:none; border-color:var(--accent); background:#fffdf8; }
.evidence-textarea:disabled { opacity:.6; background:var(--paper); }
.evidence-hints-toggle {
  font-size:11px; color:var(--ink-3); cursor:pointer;
  margin-top:6px; display:inline-flex; align-items:center; gap:4px;
  background:none; border:none; padding:0; font-family:inherit;
}
.evidence-hints-list { display:none; margin-top:8px; padding:10px 12px; background:var(--paper); border-radius:8px; }
.evidence-hints-list.open { display:block; }
.evidence-hints-list li { font-size:11.5px; color:var(--ink-3); line-height:1.6; padding:2px 0 2px 14px; position:relative; }
.evidence-hints-list li::before { content:'→'; position:absolute; left:0; color:var(--border); }

/* ===== DOMAIN SCORE SUMMARY ===== */
.domain-score-bar-wrap {
  background:var(--paper); border-radius:10px; padding:14px 16px;
  margin-top:20px; display:flex; align-items:center; gap:14px;
}
.dsb-label { font-size:13px; color:var(--ink-2); font-weight:500; flex:1; }
.dsb-val { font-size:1.3rem; font-weight:800; }

/* ===== ACTION BAR ===== */
.action-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:var(--white); border-top:1px solid var(--border);
  padding:12px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.action-bar-left { font-size:12px; color:var(--ink-3); }
.action-bar-btns { display:flex; gap:8px; }
.btn-save-draft {
  padding:9px 18px; border-radius:9px; border:1.5px solid var(--border);
  background:var(--white); color:var(--ink-2); font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:all .15s;
}
.btn-save-draft:hover { background:var(--paper); color:var(--ink); }
.btn-save-draft:disabled { opacity:.5; cursor:not-allowed; }
.btn-submit {
  padding:9px 20px; border-radius:9px; border:none;
  background:var(--accent); color:#fff; font-size:13px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all .15s;
}
.btn-submit:hover { background:var(--accent-dk); }
.btn-submit:disabled { opacity:.5; cursor:not-allowed; }

/* ===== NOTICE ===== */
.notice-bar {
  padding:12px 18px; border-radius:10px; font-size:13px;
  margin-bottom:20px; line-height:1.5;
}
.notice-info { background:#dbeafe; color:#1e40af; border:1px solid #93c5fd; }
.notice-success { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }
.notice-warning { background:#fef3c7; color:#92400e; border:1px solid #fcd34d; }

/* ===== LOADING ===== */
.page-loading { padding:60px 24px; text-align:center; color:var(--ink-3); font-size:14px; }

/* ===== PROGRESS BAR (top of page) ===== */
.progress-header {
  background:var(--white); border:1px solid var(--border);
  border-radius:12px; padding:16px 20px; margin-bottom:22px;
  display:flex; align-items:center; gap:16px;
}
.ph-label { font-size:12px; color:var(--ink-3); font-weight:500; white-space:nowrap; }
.ph-bar { flex:1; height:7px; background:var(--paper-2); border-radius:99px; overflow:hidden; }
.ph-fill { height:100%; background:var(--accent); border-radius:99px; transition:width .4s ease; }
.ph-pct { font-size:12px; font-weight:700; color:var(--accent); white-space:nowrap; }
</style>

<script type="module">
import {
  collection, doc, getDoc, getDocs, setDoc, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ===== STATE =====
let FRAMEWORK = null;
let appraisalDoc = null;   // live data object
let appraisalDocId = null; // Firestore doc ID
let currentView = 'overview'; // 'overview' | domain id
let isReviewed = false;
let saveTimer = null;

// ===== FRAMEWORK LOADER =====
async function loadFramework() {
  const res = await fetch('/resources/School%20Appraisal%20Framework.json');
  FRAMEWORK = await res.json();
}

// ===== HELPERS =====
const domainColors = { d1:'#1e40af', d2:'#065f46', d3:'#7c2d12', d4:'#4338ca', d5:'#0f766e' };
const domainBgs    = { d1:'#dbeafe', d2:'#d1fae5', d3:'#ffedd5', d4:'#ede9fe', d5:'#ccfbf1' };

function scoreLabel(n) {
  return { 1:'Beginning', 2:'Developing', 3:'Established', 4:'Exemplary' }[n] || '—';
}
function scoreCls(n) {
  if (!n) return 's0';
  return ['','s1','s2','s3','s4'][Math.round(n)] || 's0';
}
function domainAvg(domainId) {
  if (!appraisalDoc?.ratings || !FRAMEWORK) return null;
  const domain = FRAMEWORK.domains.find(d => d.id === domainId);
  if (!domain) return null;
  const vals = domain.aspects.map(a => appraisalDoc.ratings[a.id] || 0).filter(v => v > 0);
  if (!vals.length) return null;
  return (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1);
}
function domainCompletion(domainId) {
  if (!FRAMEWORK) return { done:0, total:0 };
  const domain = FRAMEWORK.domains.find(d => d.id === domainId);
  if (!domain) return { done:0, total:0 };
  const total = domain.aspects.length;
  const done = domain.aspects.filter(a => (appraisalDoc?.ratings?.[a.id] || 0) > 0).length;
  return { done, total };
}
function overallAvg() {
  if (!FRAMEWORK) return null;
  let all = [];
  FRAMEWORK.domains.forEach(d => {
    d.aspects.forEach(a => {
      const v = appraisalDoc?.ratings?.[a.id] || 0;
      if (v > 0) all.push(v);
    });
  });
  if (!all.length) return null;
  return (all.reduce((a,b) => a+b, 0) / all.length).toFixed(1);
}
function totalCompletion() {
  if (!FRAMEWORK) return { done:0, total:0 };
  let done=0, total=0;
  FRAMEWORK.domains.forEach(d => {
    total += d.aspects.length;
    done  += d.aspects.filter(a => (appraisalDoc?.ratings?.[a.id] || 0) > 0).length;
  });
  return { done, total };
}

// ===== FIND / CREATE APPRAISAL DOC =====
async function findOrCreateAppraisal(profile) {
  const schoolId = profile.schoolId;
  if (!schoolId) return null; // academic_admin with no school — they use CH

  // Find existing for this school + current year
  const currentYear = '2025-2026';
  const q = query(collection(window.db, 'school_appraisals_v2'));
  const snap = await getDocs(q);
  const existing = snap.docs.find(d => {
    const data = d.data();
    return data.schoolId === schoolId && data.academicYear === currentYear;
  });

  if (existing) {
    appraisalDocId = existing.id;
    appraisalDoc = { id: existing.id, ...existing.data() };
    return appraisalDoc;
  }

  // No doc yet — create a blank draft (school coordinator can initiate)
  // Get school name
  let schoolName = schoolId;
  try {
    const schoolSnap = await getDoc(doc(window.db, 'schools', schoolId));
    if (schoolSnap.exists()) schoolName = schoolSnap.data().name || schoolId;
  } catch(_) {}

  const newDoc = {
    schoolId,
    schoolName,
    academicYear: currentYear,
    appraiser: profile.displayName || profile.email || '',
    status: 'draft',
    ratings: {},
    evidence: {},
    strengths: '',
    improvements: '',
    recommendations: '',
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp(),
    createdBy: window.currentUser?.email || ''
  };

  const ref = doc(collection(window.db, 'school_appraisals_v2'));
  await setDoc(ref, newDoc);
  appraisalDocId = ref.id;
  appraisalDoc = { id: ref.id, ...newDoc };
  return appraisalDoc;
}

// ===== SAVE =====
async function saveAppraisal(newStatus) {
  if (!appraisalDocId || isReviewed) return;
  document.getElementById('actionStatus').textContent = 'Saving…';
  const status = newStatus || appraisalDoc.status || 'draft';
  const payload = {
    ratings:        appraisalDoc.ratings        || {},
    evidence:       appraisalDoc.evidence       || {},
    strengths:      appraisalDoc.strengths      || '',
    improvements:   appraisalDoc.improvements   || '',
    recommendations:'',
    status,
    updatedAt:      serverTimestamp(),
    updatedBy:      window.currentUser?.email || ''
  };
  await setDoc(doc(window.db, 'school_appraisals_v2', appraisalDocId), payload, { merge: true });
  appraisalDoc.status = status;
  document.getElementById('actionStatus').textContent = 'Saved ✓';
  updateTopbarStatus();
  updateSidebarScores();
  if (newStatus === 'submitted') {
    document.getElementById('btnSubmit').style.display = 'none';
    document.getElementById('btnSaveDraft').style.display = 'none';
    showNotice('submitted');
  }
}

function scheduleSave() {
  document.getElementById('actionStatus').textContent = 'Unsaved changes';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveAppraisal(), 4000);
}

// ===== STATUS =====
function updateTopbarStatus() {
  const el = document.getElementById('topbarStatus');
  const s = appraisalDoc?.status || 'draft';
  el.className = 'topbar-status ' + { draft:'ts-draft', submitted:'ts-submitted', reviewed:'ts-reviewed' }[s];
  el.textContent = { draft:'In Progress', submitted:'Submitted', reviewed:'Reviewed' }[s] || s;
}

// ===== SIDEBAR SCORES =====
function updateSidebarScores() {
  if (!FRAMEWORK) return;
  FRAMEWORK.domains.forEach(d => {
    const avg = domainAvg(d.id);
    const el = document.getElementById(`sidebar-score-${d.id}`);
    if (!el) return;
    el.textContent = avg || '—';
    el.className = 'dnb-score ' + (avg ? scoreCls(parseFloat(avg)) : 's0');
    el.style.background = avg ? '' : 'var(--paper-2)';
  });
  // progress bar
  const { done, total } = totalCompletion();
  const pct = total ? Math.round((done/total)*100) : 0;
  const fill = document.getElementById('progressFill');
  const pctEl = document.getElementById('progressPct');
  if (fill) fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
}

// ===== NOTICE =====
function showNotice(type) {
  const noticeMap = {
    submitted: { cls:'notice-success', msg:'Your self-appraisal has been submitted for review. An Eduversal coordinator will review and provide feedback.' },
    reviewed:  { cls:'notice-info',    msg:'This appraisal has been reviewed. The fields are now read-only. Contact Eduversal if you need to make amendments.' },
    noschoool: { cls:'notice-warning', msg:'Your account does not have a school assigned. Please contact your Eduversal coordinator to link your school profile.' }
  };
  const n = noticeMap[type];
  if (!n) return;
  const existing = document.getElementById('pageNotice');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'pageNotice';
  el.className = `notice-bar ${n.cls}`;
  el.textContent = n.msg;
  document.getElementById('pageContent').prepend(el);
}

// ===== RENDER OVERVIEW =====
function renderOverview() {
  const avg = overallAvg();
  const { done, total } = totalCompletion();
  const pct = total ? Math.round((done/total)*100) : 0;

  const domainCards = FRAMEWORK.domains.map(d => {
    const davg = domainAvg(d.id);
    const { done: dDone, total: dTotal } = domainCompletion(d.id);
    const col = domainColors[d.id] || '#6b7280';
    const bg  = domainBgs[d.id]   || '#f3f4f6';
    const fill = davg ? `${(parseFloat(davg)/4)*100}%` : '0%';
    return `
      <div class="domain-card" data-domain="${d.id}" onclick="window.__switchDomain('${d.id}')">
        <div class="dc-code" style="color:${col}">${d.code}</div>
        <div class="dc-title">${d.title}</div>
        <div class="dc-score-row">
          <div class="dc-score-bar"><div class="dc-score-fill" style="width:${fill};background:${col};"></div></div>
          <div class="dc-score-num" style="color:${col}">${davg || '—'}</div>
        </div>
        <div class="dc-completion">${dDone}/${dTotal} aspects rated</div>
      </div>`;
  }).join('');

  const canEdit = !isReviewed && appraisalDoc?.status !== 'submitted';

  return `
    <div class="overview-hero">
      <div class="oh-eyebrow">Eduversal School Appraisal · ${appraisalDoc?.academicYear || '2025–2026'}</div>
      <h1 class="oh-title">${appraisalDoc?.schoolName || 'Your School'}</h1>
      <p class="oh-sub">${FRAMEWORK.meta.description}</p>
      <div class="oh-score-row">
        <div class="oh-score-chip">
          <div class="oh-score-val">${avg || '—'}</div>
          <div class="oh-score-label">Overall Score</div>
        </div>
        <div class="oh-score-chip">
          <div class="oh-score-val">${pct}%</div>
          <div class="oh-score-label">Completed</div>
        </div>
        <div class="oh-score-chip">
          <div class="oh-score-val">${done}/${total}</div>
          <div class="oh-score-label">Aspects Rated</div>
        </div>
      </div>
    </div>

    <div class="progress-header">
      <span class="ph-label">Overall Completion</span>
      <div class="ph-bar"><div class="ph-fill" id="progressFill" style="width:${pct}%"></div></div>
      <span class="ph-pct" id="progressPct">${pct}%</span>
    </div>

    <div class="domain-grid">${domainCards}</div>

    <div style="margin-bottom:16px;">
      <div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:14px;">School Summary</div>
      <div class="overview-fields">
        <div class="field-block">
          <label>Key Strengths</label>
          <textarea id="ov-strengths" data-field="strengths" placeholder="What does your school do particularly well?" ${!canEdit?'disabled':''}>${appraisalDoc?.strengths || ''}</textarea>
        </div>
        <div class="field-block">
          <label>Areas for Improvement</label>
          <textarea id="ov-improvements" data-field="improvements" placeholder="What are your school's priority development areas?" ${!canEdit?'disabled':''}>${appraisalDoc?.improvements || ''}</textarea>
        </div>
      </div>
      ${appraisalDoc?.recommendations ? `
        <div class="field-block" style="margin-top:4px;">
          <label>Eduversal Coordinator Recommendations</label>
          <textarea disabled style="min-height:80px;">${appraisalDoc.recommendations}</textarea>
        </div>` : ''}
    </div>`;
}

// ===== RENDER DOMAIN =====
function renderDomain(domainId) {
  const domain = FRAMEWORK.domains.find(d => d.id === domainId);
  if (!domain) return '';
  const col = domainColors[domainId] || '#6b7280';
  const bg  = domainBgs[domainId]   || '#f3f4f6';
  const davg = domainAvg(domainId);
  const canEdit = !isReviewed && appraisalDoc?.status !== 'submitted';

  const aspectsHtml = domain.aspects.map((aspect, idx) => {
    const rating = appraisalDoc?.ratings?.[aspect.id] || 0;
    const evidence = appraisalDoc?.evidence?.[aspect.id] || '';
    const badgeText = rating ? `${rating} — ${scoreLabel(rating)}` : 'Not rated';

    const ratingBtns = [1,2,3,4].map(v => {
      const scale = FRAMEWORK.meta.rating_scale[v];
      const cls = rating === v ? `rating-btn sel-${v}` : 'rating-btn';
      return `<button class="${cls}" value="${v}" data-aspect="${aspect.id}" ${!canEdit?'disabled':''} title="${scale.description}">${v} — ${scale.label}</button>`;
    }).join('');

    const expectItems = aspect.expectations.map(e => `<li>${e}</li>`).join('');
    const hintItems   = aspect.evidence_examples.map(e => `<li>${e}</li>`).join('');

    return `
      <div class="aspect-card" id="aspect-${aspect.id}">
        <div class="aspect-head">
          <div>
            <div class="aspect-num">${domain.code}.${idx+1}</div>
            <div class="aspect-title">${aspect.title}</div>
            <div class="aspect-desc">${aspect.description}</div>
          </div>
          <span class="aspect-score-badge ${scoreCls(rating)}" id="badge-${aspect.id}">${badgeText}</span>
        </div>
        <div class="aspect-body">
          <button class="expectations-toggle" onclick="window.__toggleExpectations('${aspect.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            What is expected (${aspect.expectations.length} criteria)
          </button>
          <ul class="expectations-list" id="exp-${aspect.id}">${expectItems}</ul>

          <div class="rating-label">Self-Assessment Rating</div>
          <div class="rating-options" id="rating-${aspect.id}">${ratingBtns}</div>

          <div class="evidence-label">Evidence & Notes</div>
          <textarea class="evidence-textarea" data-aspect="${aspect.id}" placeholder="Describe the evidence that supports your rating…" ${!canEdit?'disabled':''}>${evidence}</textarea>
          <button class="evidence-hints-toggle" onclick="window.__toggleHints('${aspect.id}')">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Show evidence examples
          </button>
          <ul class="evidence-hints-list" id="hints-${aspect.id}">${hintItems}</ul>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="domain-header" style="background:${bg};">
      <div class="dh-icon">${domain.icon}</div>
      <div>
        <div class="dh-code" style="color:${col}">${domain.code}</div>
        <div class="dh-title" style="color:${col}">${domain.title}</div>
        <div class="dh-desc">${domain.description}</div>
      </div>
    </div>
    ${aspectsHtml}
    <div class="domain-score-bar-wrap">
      <div class="dsb-label">Domain Average Score</div>
      <div class="dsb-val ${scoreCls(parseFloat(davg || 0))}" id="domain-avg-${domainId}">
        ${davg ? `${davg} — ${scoreLabel(Math.round(parseFloat(davg)))}` : '—'}
      </div>
    </div>`;
}

// ===== SWITCH VIEW =====
function switchView(viewId) {
  currentView = viewId;

  // Update sidebar active state
  document.querySelectorAll('.overview-nav-btn').forEach(b => b.classList.toggle('active', viewId === 'overview'));
  document.querySelectorAll('.domain-nav-btn').forEach(b => {
    const active = b.dataset.domain === viewId;
    b.classList.toggle('active', active);
    const col = domainColors[viewId] || '#6b7280';
    b.style.background = active ? domainBgs[viewId] || '' : '';
    b.style.color = active ? col : '';
  });

  // Render content
  const content = document.getElementById('pageContent');
  const notice = document.getElementById('pageNotice');
  content.innerHTML = '';
  if (notice) content.appendChild(notice);

  const html = viewId === 'overview' ? renderOverview() : renderDomain(viewId);
  content.insertAdjacentHTML('beforeend', html);

  // Wire overview textareas
  if (viewId === 'overview') {
    content.querySelectorAll('textarea[data-field]').forEach(ta => {
      ta.addEventListener('input', () => {
        appraisalDoc[ta.dataset.field] = ta.value;
        scheduleSave();
      });
    });
  }

  // Wire domain rating buttons + evidence textareas
  if (viewId !== 'overview') {
    content.querySelectorAll('.rating-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const aspectId = btn.dataset.aspect;
        const val = parseInt(btn.value);
        if (!appraisalDoc.ratings) appraisalDoc.ratings = {};
        appraisalDoc.ratings[aspectId] = val;
        // Update button states
        const row = document.getElementById(`rating-${aspectId}`);
        row.querySelectorAll('.rating-btn').forEach(b => b.className = 'rating-btn');
        btn.className = `rating-btn sel-${val}`;
        // Update badge
        const badge = document.getElementById(`badge-${aspectId}`);
        if (badge) { badge.textContent = `${val} — ${scoreLabel(val)}`; badge.className = `aspect-score-badge ${scoreCls(val)}`; }
        // Update domain avg
        const davg = domainAvg(viewId);
        const avgEl = document.getElementById(`domain-avg-${viewId}`);
        if (avgEl) { avgEl.textContent = davg ? `${davg} — ${scoreLabel(Math.round(parseFloat(davg)))}` : '—'; avgEl.className = `dsb-val ${scoreCls(parseFloat(davg || 0))}`; }
        // Update sidebar score
        updateSidebarScores();
        scheduleSave();
      });
    });

    content.querySelectorAll('textarea.evidence-textarea').forEach(ta => {
      ta.addEventListener('input', () => {
        if (!appraisalDoc.evidence) appraisalDoc.evidence = {};
        appraisalDoc.evidence[ta.dataset.aspect] = ta.value;
        scheduleSave();
      });
    });
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== GLOBAL TOGGLE FUNCTIONS =====
window.__switchDomain = (id) => switchView(id);
window.__toggleExpectations = (aspectId) => {
  const list = document.getElementById(`exp-${aspectId}`);
  const btn  = list?.previousElementSibling;
  if (!list) return;
  list.classList.toggle('open');
  btn?.classList.toggle('open');
};
window.__toggleHints = (aspectId) => {
  document.getElementById(`hints-${aspectId}`)?.classList.toggle('open');
};

// ===== BUILD SIDEBAR DOMAIN BUTTONS =====
function buildSidebar() {
  const container = document.getElementById('sidebarDomainBtns');
  FRAMEWORK.domains.forEach(d => {
    const col = domainColors[d.id] || '#6b7280';
    const btn = document.createElement('button');
    btn.className = 'domain-nav-btn';
    btn.dataset.domain = d.id;
    btn.innerHTML = `
      <span class="dnb-icon">${d.icon}</span>
      <span class="dnb-label">${d.code}: ${d.title}</span>
      <span class="dnb-score s0" id="sidebar-score-${d.id}">—</span>`;
    btn.style.setProperty('--d-col', col);
    btn.addEventListener('click', () => switchView(d.id));
    container.appendChild(btn);
  });
}

// ===== INIT =====
document.addEventListener('authReady', async ({ detail: { user, profile } }) => {
  window.__loadAcademicNavbar('school-appraisal', { user, profile });

  await loadFramework();

  const appraisal = await findOrCreateAppraisal(profile);

  document.getElementById('pageLoading').style.display = 'none';

  if (!appraisal) {
    // No schoolId on profile
    document.getElementById('pageContent').style.display = 'block';
    document.getElementById('pageContent').innerHTML = `<div class="notice-bar notice-warning">Your account does not have a school assigned. Please contact your Eduversal coordinator to link your school to your profile before completing a self-appraisal.</div>`;
    return;
  }

  isReviewed = appraisal.status === 'reviewed';
  document.getElementById('topbarTitle').textContent = appraisal.schoolName || 'School Self-Appraisal';
  updateTopbarStatus();

  // Build sidebar
  buildSidebar();

  // Sidebar overview btn
  document.querySelector('.overview-nav-btn')?.addEventListener('click', () => switchView('overview'));

  // Action bar
  const actionBar = document.getElementById('actionBar');
  if (!isReviewed && appraisal.status !== 'submitted') {
    actionBar.style.display = 'flex';
  }
  if (appraisal.status === 'submitted') {
    actionBar.style.display = 'flex';
    document.getElementById('btnSubmit').style.display = 'none';
    document.getElementById('actionStatus').textContent = 'Submitted — awaiting review';
  }
  if (isReviewed) {
    actionBar.style.display = 'none';
  }

  document.getElementById('btnSaveDraft').addEventListener('click', () => saveAppraisal('draft'));
  document.getElementById('btnSubmit').addEventListener('click', async () => {
    const { done, total } = totalCompletion();
    if (done < total) {
      const pct = Math.round((done/total)*100);
      if (!confirm(`You have only completed ${done} of ${total} aspects (${pct}%). Are you sure you want to submit now?`)) return;
    }
    await saveAppraisal('submitted');
  });

  // Render initial view
  document.getElementById('pageContent').style.display = 'block';
  switchView('overview');
  updateSidebarScores();

  // Show notices
  if (isReviewed) showNotice('reviewed');
  else if (appraisal.status === 'submitted') showNotice('submitted');
});
</script>
</body>
</html>
