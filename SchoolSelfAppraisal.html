<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Self-Appraisal — Academic Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="firebase-config.js"></script>
<script>if (!window.ENV) window.ENV = { FIREBASE_API_KEY: "__FIREBASE_API_KEY__", FIREBASE_AUTH_DOMAIN: "__FIREBASE_AUTH_DOMAIN__", FIREBASE_PROJECT_ID: "__FIREBASE_PROJECT_ID__", FIREBASE_STORAGE_BUCKET: "__FIREBASE_STORAGE_BUCKET__", FIREBASE_MESSAGING_SENDER_ID: "__FIREBASE_MESSAGING_SENDER_ID__", FIREBASE_APP_ID: "__FIREBASE_APP_ID__" };</script>
<script type="module" src="auth-guard.js"></script>
<script src="partials/navbar-loader.js"></script>
<style>
:root {
  --ink:#1c1c2e; --ink-2:#44445a; --ink-3:#8888a8;
  --paper:#f7f6f3; --paper-2:#eeece8; --white:#ffffff; --border:#e0ddd6;
  --accent:#b45309; --accent-2:#fef3c7; --accent-dk:#92400e;
  --d1:#1e40af; --d1-bg:#dbeafe; --d1-border:#bfdbfe;
  --d2:#065f46; --d2-bg:#d1fae5; --d2-border:#a7f3d0;
  --d3:#7c2d12; --d3-bg:#ffedd5; --d3-border:#fed7aa;
  --d4:#4338ca; --d4-bg:#ede9fe; --d4-border:#c4b5fd;
  --d5:#0f766e; --d5-bg:#ccfbf1; --d5-border:#99f6e4;
  --shadow-sm:0 1px 4px rgba(28,28,46,.07);
  --shadow:0 3px 14px rgba(28,28,46,.10);
  --shadow-lg:0 8px 32px rgba(28,28,46,.14);
  --radius:10px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; font-size:14px; padding-top:62px; }

/* ===== TOPBAR ===== */
.page-topbar {
  background:#1c1005; border-bottom:2px solid var(--accent);
  position:sticky; top:62px; z-index:90; height:54px;
  display:flex; align-items:center; padding:0 24px; gap:14px;
}
.topbar-back { display:flex; align-items:center; gap:6px; font-size:12px; color:rgba(255,255,255,.5); text-decoration:none; transition:color .15s; }
.topbar-back:hover { color:#fff; }
.topbar-sep { color:rgba(255,255,255,.25); }
.topbar-title { font-size:14px; font-weight:700; color:#fff; }
.topbar-status { margin-left:auto; font-size:12px; font-weight:600; padding:3px 10px; border-radius:99px; }
.ts-draft     { background:rgba(255,255,255,.1); color:rgba(255,255,255,.6); }
.ts-submitted { background:#fef3c7; color:#92400e; }
.ts-reviewed  { background:#d1fae5; color:#065f46; }

/* ===== LAYOUT ===== */
.page-body { display:flex; min-height:calc(100vh - 116px); }

/* ===== SIDEBAR ===== */
.domain-sidebar {
  width:240px; flex-shrink:0;
  position:sticky; top:116px; height:calc(100vh - 116px);
  overflow-y:auto; background:var(--white);
  border-right:1px solid var(--border);
  padding:16px 10px 24px;
}
.sidebar-section-label {
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.1em; color:var(--ink-3); padding:4px 10px 8px;
}
.overview-nav-btn {
  width:100%; padding:10px 12px; border-radius:10px;
  font-size:13px; font-weight:500; cursor:pointer; border:none;
  text-align:left; background:transparent; color:var(--ink-2);
  display:flex; align-items:center; gap:9px;
  margin-bottom:6px; font-family:inherit; transition:all .15s;
}
.overview-nav-btn:hover { background:var(--paper); color:var(--ink); }
.overview-nav-btn.active { background:var(--accent-2); color:var(--accent-dk); font-weight:700; }
.nav-divider { height:1px; background:var(--border); margin:10px 8px 12px; }

/* Domain card in sidebar */
.domain-nav-card {
  width:100%; margin-bottom:6px; border-radius:11px;
  border:1.5px solid var(--border); background:var(--white);
  cursor:pointer; text-align:left; font-family:inherit;
  padding:10px 12px; transition:all .2s; overflow:hidden;
  position:relative;
}
.domain-nav-card:hover { box-shadow:var(--shadow); transform:translateY(-1px); }
.domain-nav-card.active { border-width:2px; box-shadow:var(--shadow); }
.dnc-top { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.dnc-icon { font-size:16px; flex-shrink:0; }
.dnc-code { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; }
.dnc-title { font-size:11.5px; font-weight:700; color:var(--ink); line-height:1.3; flex:1; }
.dnc-score-badge {
  font-size:11px; font-weight:800; padding:2px 8px;
  border-radius:99px; flex-shrink:0;
}
/* Progress mini-bar */
.dnc-progress { display:flex; align-items:center; gap:7px; }
.dnc-dots { display:flex; gap:3px; flex:1; }
.dnc-dot {
  flex:1; height:4px; border-radius:2px;
  background:var(--paper-2); transition:background .3s;
}
.dnc-dot.done { }
.dnc-completion-txt { font-size:10px; color:var(--ink-3); font-weight:500; white-space:nowrap; }

/* Sidebar overall progress */
.sidebar-overall {
  margin:0 2px 12px; padding:10px 12px;
  background:var(--paper); border-radius:10px;
  border:1px solid var(--border);
}
.sop-label { font-size:10px; color:var(--ink-3); font-weight:600; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.sop-bar { height:6px; background:var(--paper-2); border-radius:3px; overflow:hidden; margin-bottom:5px; }
.sop-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .4s ease; }
.sop-row { display:flex; justify-content:space-between; font-size:11px; }
.sop-pct { font-weight:700; color:var(--accent); }
.sop-count { color:var(--ink-3); }

@media (max-width:960px) { .domain-sidebar { display:none; } }

/* ===== MAIN ===== */
.page-main { flex:1; padding:32px 28px 100px; min-width:0; max-width:860px; }
@media (max-width:768px) { .page-main { padding:24px 16px 80px; } }

/* ===== SCORE CLASSES ===== */
.s0 { background:var(--paper-2); color:var(--ink-3); }
.s1 { background:#fee2e2; color:#991b1b; }
.s2 { background:#fef3c7; color:#92400e; }
.s3 { background:#d1fae5; color:#065f46; }
.s4 { background:#dbeafe; color:#1e40af; }

/* ===== OVERVIEW ===== */
.overview-hero {
  background:linear-gradient(135deg,#78350f,#b45309,#d97706);
  border-radius:16px; padding:28px; color:#fff; margin-bottom:22px;
}
.oh-eyebrow { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.6); margin-bottom:8px; }
.oh-title { font-family:'Lora',serif; font-size:1.7rem; font-weight:600; margin-bottom:6px; line-height:1.2; }
.oh-sub { font-size:13px; color:rgba(255,255,255,.7); line-height:1.6; max-width:580px; }
.oh-score-row { display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; }
.oh-score-chip { background:rgba(255,255,255,.15); border-radius:10px; padding:12px 18px; text-align:center; min-width:90px; }
.oh-score-val { font-size:1.8rem; font-weight:800; line-height:1; }
.oh-score-label { font-size:11px; color:rgba(255,255,255,.65); margin-top:3px; }

/* References strip */
.ref-strip {
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;
  padding:12px 16px; background:var(--white);
  border:1px solid var(--border); border-radius:10px;
}
.ref-pill {
  font-size:11px; font-weight:600; padding:3px 9px; border-radius:99px;
  background:var(--paper-2); color:var(--ink-3); border:1px solid var(--border);
  text-decoration:none; transition:background .15s, color .15s;
}
.ref-pill:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.ref-strip-label { font-size:11px; color:var(--ink-3); font-weight:500; align-self:center; margin-right:4px; }

.evidence-link-section { margin-top:10px; }
.evidence-link-label { font-size:11px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; display:block; }
.evidence-link-row { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
.evidence-link-input { flex:1; font-size:12px; padding:7px 10px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; color:var(--ink); background:var(--white); }
.evidence-link-input:focus { outline:none; border-color:var(--accent); }
.evidence-link-input::placeholder { color:var(--ink-3); }
.evidence-link-add-btn { font-size:11px; font-weight:600; padding:7px 12px; border-radius:8px; border:1.5px solid var(--accent); background:var(--white); color:var(--accent); cursor:pointer; white-space:nowrap; }
.evidence-link-add-btn:hover { background:var(--accent); color:#fff; }
.link-list { display:flex; flex-direction:column; gap:5px; margin-top:4px; }
.link-item { display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--border); border-radius:7px; padding:6px 10px; }
.link-item-icon { font-size:13px; flex-shrink:0; }
.link-item-url { font-size:11px; color:var(--accent); text-decoration:none; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.link-item-url:hover { text-decoration:underline; }
.link-item-remove { font-size:10px; color:var(--ink-3); background:none; border:none; cursor:pointer; padding:2px 5px; border-radius:4px; flex-shrink:0; }
.link-item-remove:hover { background:var(--border); color:var(--ink); }

.domain-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:12px; margin-bottom:22px; }
.domain-card {
  background:var(--white); border:1.5px solid var(--border);
  border-radius:12px; padding:16px; cursor:pointer;
  transition:box-shadow .15s, transform .15s;
}
.domain-card:hover { box-shadow:var(--shadow); transform:translateY(-2px); }
.dc-top { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.dc-icon { font-size:18px; }
.dc-code { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; }
.dc-title { font-size:13px; font-weight:700; line-height:1.35; margin-bottom:10px; }
.dc-score-row { display:flex; align-items:center; gap:8px; }
.dc-score-bar { flex:1; height:5px; background:var(--paper-2); border-radius:3px; overflow:hidden; }
.dc-score-fill { height:100%; border-radius:3px; transition:width .4s ease; }
.dc-score-num { font-size:12px; font-weight:700; min-width:24px; text-align:right; }
.dc-completion { font-size:11px; color:var(--ink-3); margin-top:5px; }

.overview-fields { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
@media (max-width:600px) { .overview-fields { grid-template-columns:1fr; } }
.field-block label { display:block; font-size:11px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.field-block textarea {
  width:100%; min-height:90px; padding:10px 12px;
  border:1.5px solid var(--border); border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink);
  resize:vertical; background:var(--white); line-height:1.55; transition:border-color .15s;
}
.field-block textarea:focus { outline:none; border-color:var(--accent); background:#fffdf8; }
.field-block textarea:disabled { opacity:.6; background:var(--paper); }

/* ===== DOMAIN PANEL ===== */
.domain-header {
  border-radius:16px; margin-bottom:6px; overflow:hidden;
}
.dh-top {
  display:flex; align-items:flex-start; gap:16px;
  padding:22px 24px;
}
.dh-icon { font-size:2.2rem; flex-shrink:0; margin-top:2px; }
.dh-meta { flex:1; }
.dh-code { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.12em; margin-bottom:4px; }
.dh-title { font-family:'Lora',serif; font-size:1.25rem; font-weight:600; line-height:1.25; margin-bottom:6px; }
.dh-desc { font-size:13px; line-height:1.65; opacity:.85; }
.dh-bottom {
  padding:12px 24px; display:flex; align-items:center; gap:12px;
  border-top:1px solid rgba(255,255,255,.2); flex-wrap:wrap;
}
.dh-stat { font-size:12px; opacity:.75; display:flex; align-items:center; gap:5px; }
.dh-refs { display:flex; gap:6px; flex-wrap:wrap; margin-left:auto; }
.dh-ref-tag {
  font-size:10px; font-weight:700; padding:2px 8px; border-radius:99px;
  background:rgba(255,255,255,.2); color:rgba(255,255,255,.9);
}

/* ===== ASPECT CARD ===== */
.aspect-card {
  background:var(--white); border:1px solid var(--border);
  border-radius:12px; margin-bottom:16px; overflow:hidden;
  transition:box-shadow .15s;
}
.aspect-card:hover { box-shadow:var(--shadow-sm); }
.aspect-head {
  padding:16px 20px; background:var(--paper);
  border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
}
.aspect-num { font-size:10px; font-weight:800; color:var(--ink-3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
.aspect-title { font-size:14.5px; font-weight:700; color:var(--ink); margin-bottom:4px; }
.aspect-desc { font-size:12.5px; color:var(--ink-2); line-height:1.6; }
.aspect-score-badge { font-size:11px; font-weight:700; padding:4px 11px; border-radius:99px; white-space:nowrap; flex-shrink:0; margin-top:2px; }

.aspect-body { padding:18px 20px; }

/* Collapsible block */
.collapsible-btn {
  display:flex; align-items:center; gap:7px;
  font-size:11.5px; font-weight:700; color:var(--ink-3);
  text-transform:uppercase; letter-spacing:.05em;
  cursor:pointer; background:none; border:none; padding:0;
  font-family:inherit; margin-bottom:10px;
}
.collapsible-btn svg { transition:transform .2s; flex-shrink:0; }
.collapsible-btn.open svg { transform:rotate(90deg); }
.collapsible-block { display:none; border-radius:10px; margin-bottom:16px; overflow:hidden; }
.collapsible-block.open { display:block; }

/* Expectations */
.expectations-inner { padding:14px 16px; background:var(--paper); }
.expectations-inner li {
  font-size:12.5px; color:var(--ink-2); line-height:1.65;
  padding:5px 0 5px 18px; position:relative;
  border-bottom:1px solid var(--border);
}
.expectations-inner li:last-child { border-bottom:none; }
.expectations-inner li::before { content:'✓'; position:absolute; left:0; color:#10b981; font-weight:700; font-size:11px; top:6px; }

/* Rating scale info */
.rating-scale-info {
  display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;
}
.rsi-item {
  flex:1; min-width:90px; padding:8px 10px; border-radius:8px;
  border:1.5px solid var(--border); background:var(--white);
  text-align:center;
}
.rsi-num { font-size:16px; font-weight:800; line-height:1; margin-bottom:3px; }
.rsi-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:2px; }
.rsi-desc { font-size:10px; color:var(--ink-3); line-height:1.4; }
.rsi-guide { font-size:10px; color:var(--ink-2); line-height:1.45; margin-top:5px; padding-top:5px; border-top:1px solid var(--border); font-style:italic; }
.rsi-1 { border-color:#fca5a5; background:#fff5f5; }
.rsi-1 .rsi-num { color:#991b1b; }
.rsi-2 { border-color:#fcd34d; background:#fffbeb; }
.rsi-2 .rsi-num { color:#92400e; }
.rsi-3 { border-color:#6ee7b7; background:#f0fdf4; }
.rsi-3 .rsi-num { color:#065f46; }
.rsi-4 { border-color:#93c5fd; background:#eff6ff; }
.rsi-4 .rsi-num { color:#1e40af; }

/* Rating buttons */
.rating-section-label { font-size:11px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px; }
.rating-options { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
.rating-btn {
  padding:9px 16px; border-radius:9px; font-size:13px; font-weight:600;
  border:1.5px solid var(--border); background:var(--white);
  cursor:pointer; transition:all .15s; color:var(--ink-2); font-family:inherit;
}
.rating-btn:hover { border-color:var(--accent); color:var(--accent-dk); transform:translateY(-1px); }
.rating-btn:disabled { cursor:not-allowed; opacity:.5; transform:none; }
.rating-btn.sel-1 { background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
.rating-btn.sel-2 { background:#fef3c7; border-color:#fcd34d; color:#92400e; }
.rating-btn.sel-3 { background:#d1fae5; border-color:#6ee7b7; color:#065f46; }
.rating-btn.sel-4 { background:#dbeafe; border-color:#93c5fd; color:#1e40af; }

/* Evidence */
.evidence-section-label { font-size:11px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
.evidence-textarea {
  width:100%; min-height:80px; padding:10px 12px;
  border:1.5px solid var(--border); border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink);
  resize:vertical; background:var(--white); line-height:1.55; transition:border-color .15s;
  margin-bottom:10px;
}
.evidence-textarea:focus { outline:none; border-color:var(--accent); background:#fffdf8; }
.evidence-textarea:disabled { opacity:.6; background:var(--paper); }

/* Evidence examples */
.hints-inner { padding:12px 14px; background:#fafaf8; border:1px solid var(--border); border-radius:10px; }
.hints-inner li {
  font-size:12px; color:var(--ink-3); line-height:1.65;
  padding:3px 0 3px 18px; position:relative;
}
.hints-inner li::before { content:'→'; position:absolute; left:0; color:var(--border); font-size:11px; }

/* ===== FILE UPLOAD ===== */
.file-upload-section { margin-top:10px; }
.file-upload-label { font-size:11px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; display:block; }
.drop-zone {
  border:2px dashed var(--border); border-radius:10px;
  padding:16px 20px; text-align:center; cursor:pointer;
  transition:all .2s; background:var(--paper);
  display:flex; align-items:center; gap:12px;
}
.drop-zone:hover, .drop-zone.dragover { border-color:var(--accent); background:var(--accent-2); }
.drop-zone-icon { font-size:20px; flex-shrink:0; }
.drop-zone-text { font-size:12.5px; color:var(--ink-3); text-align:left; }
.drop-zone-text strong { color:var(--accent); }
.drop-zone-sub { font-size:11px; color:var(--ink-3); margin-top:2px; }

.file-list { margin-top:10px; display:flex; flex-direction:column; gap:6px; }
.file-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px; background:var(--white);
  border:1px solid var(--border); border-radius:9px;
}
.file-item-icon { font-size:16px; flex-shrink:0; }
.file-item-name { font-size:12.5px; font-weight:600; color:var(--ink); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-item-size { font-size:11px; color:var(--ink-3); flex-shrink:0; }
.file-item-link { font-size:11px; color:var(--accent); text-decoration:none; font-weight:600; flex-shrink:0; }
.file-item-link:hover { text-decoration:underline; }
.file-item-remove {
  width:22px; height:22px; border-radius:50%; border:1px solid var(--border);
  background:var(--white); color:var(--ink-3); display:flex; align-items:center;
  justify-content:center; cursor:pointer; font-size:11px; flex-shrink:0;
  transition:all .14s; font-family:inherit;
}
.file-item-remove:hover { background:#ffe4e6; border-color:#fca5a5; color:#dc2626; }
.upload-progress {
  height:3px; background:var(--paper-2); border-radius:2px; margin-top:6px; overflow:hidden; display:none;
}
.upload-progress-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }

/* Domain score summary */
.domain-score-bar-wrap {
  background:var(--paper); border-radius:10px; padding:16px 20px;
  margin-top:20px; display:flex; align-items:center; gap:16px;
  border:1px solid var(--border);
}
.dsb-label { font-size:13px; color:var(--ink-2); font-weight:500; flex:1; }
.dsb-val { font-size:1.3rem; font-weight:800; }

/* Action bar */
.action-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:var(--white); border-top:1px solid var(--border);
  padding:12px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.action-bar-left { font-size:12px; color:var(--ink-3); }
.action-bar-btns { display:flex; gap:8px; }
.btn-save-draft {
  padding:9px 18px; border-radius:9px; border:1.5px solid var(--border);

  cursor:pointer; font-family:inherit; transition:all .15s;
}
.btn-save-draft:hover { background:var(--paper); color:var(--ink); }
.btn-save-draft:disabled { opacity:.5; cursor:not-allowed; }
.btn-submit {

}
.btn-submit:hover { background:var(--accent-dk); }
.btn-submit:disabled { opacity:.5; cursor:not-allowed; }

/* Notice */
.notice-bar { padding:12px 18px; border-radius:10px; font-size:13px; margin-bottom:20px; line-height:1.5; }
.notice-info    { background:#dbeafe; color:#1e40af; border:1px solid #93c5fd; }
.notice-success { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }

.page-loading { padding:60px 24px; text-align:center; color:var(--ink-3); font-size:14px; }
</style>
</head>

<div id="navbarMount"></div>

<div class="page-topbar">

<input type="file" id="globalFileInput" style="display:none;" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png,.zip">

<script src="firebase-config.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
import {
  collection, doc, getDoc, getDocs, setDoc, query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL, deleteObject
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

let FRAMEWORK = null;
let appraisalDoc = null;
let appraisalDocId = null;
let currentView = 'overview';
let isReviewed = false;
let saveTimer = null;
let pendingUploadAspect = null;

const domainColors = { d1:'#1e40af', d2:'#065f46', d3:'#7c2d12', d4:'#4338ca', d5:'#0f766e' };
const domainBgs    = { d1:'#dbeafe', d2:'#d1fae5', d3:'#ffedd5', d4:'#ede9fe', d5:'#ccfbf1' };
const domainBorders= { d1:'#bfdbfe', d2:'#a7f3d0', d3:'#fed7aa', d4:'#c4b5fd', d5:'#99f6e4' };

async function loadFramework() {
  const res = await fetch('/resources/School%20Appraisal%20Framework.json');
  FRAMEWORK = await res.json();
}

function scoreLabel(n) { return { 1:'Beginning', 2:'Developing', 3:'Established', 4:'Exemplary' }[n] || '—'; }
function scoreCls(n) { if (!n) return 's0'; return ['','s1','s2','s3','s4'][Math.round(n)] || 's0'; }
function domainAvg(domainId) {
  if (!appraisalDoc?.ratings || !FRAMEWORK) return null;
  const domain = FRAMEWORK.domains.find(d => d.id === domainId);
  if (!domain) return null;
  const vals = domain.aspects.map(a => appraisalDoc.ratings[a.id] || 0).filter(v => v > 0);
  if (!vals.length) return null;
  return (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1);
}
function domainCompletion(domainId) {
  if (!FRAMEWORK) return { done:0, total:0 };
  const domain = FRAMEWORK.domains.find(d => d.id === domainId);
  if (!domain) return { done:0, total:0 };
  const total = domain.aspects.length;
  const done = domain.aspects.filter(a => (appraisalDoc?.ratings?.[a.id] || 0) > 0).length;
  return { done, total };
}
function overallAvg() {
  if (!FRAMEWORK) return null;
  let all = [];
  FRAMEWORK.domains.forEach(d => d.aspects.forEach(a => { const v = appraisalDoc?.ratings?.[a.id] || 0; if (v > 0) all.push(v); }));
  if (!all.length) return null;
  return (all.reduce((a,b) => a+b, 0) / all.length).toFixed(1);
}
function totalCompletion() {
  if (!FRAMEWORK) return { done:0, total:0 };
  let done=0, total=0;
  FRAMEWORK.domains.forEach(d => { total += d.aspects.length; done += d.aspects.filter(a => (appraisalDoc?.ratings?.[a.id] || 0) > 0).length; });
  return { done, total };
}

// ===== FIND / CREATE =====
async function findOrCreateAppraisal(profile) {
  const schoolId = profile.schoolId || null;
  if (!schoolId) return null;
  let schoolName = null;
  try { const s = await getDoc(doc(window.db, 'partner_schools', schoolId)); if (s.exists()) schoolName = s.data().name || schoolId; } catch(_) {}
  if (!schoolName) { try { const s = await getDoc(doc(window.db, 'schools', schoolId)); if (s.exists()) schoolName = s.data().name || schoolId; } catch(_) {} }
  if (!schoolName) return null;
  const currentYear = '2025-2026';
  const snap = await getDocs(query(collection(window.db, 'school_appraisals_v2'), where('schoolId','==',schoolId), where('academicYear','==',currentYear)));
  if (!snap.empty) {
    const d = snap.docs[0];
    appraisalDocId = d.id; appraisalDoc = { id: d.id, ...d.data() }; return appraisalDoc;
  }
  const newDoc = { schoolId, schoolName, academicYear: currentYear, appraiser: profile.displayName || profile.email || '', status: 'draft', ratings: {}, evidence: {}, files: {}, links: {}, strengths: '', improvements: '', recommendations: '', createdAt: serverTimestamp(), updatedAt: serverTimestamp(), createdBy: window.currentUser?.email || '' };
  const ref = doc(collection(window.db, 'school_appraisals_v2'));
  await setDoc(ref, newDoc);
  appraisalDocId = ref.id; appraisalDoc = { id: ref.id, ...newDoc }; return appraisalDoc;
}

// ===== SAVE =====
async function saveAppraisal(newStatus) {
  if (!appraisalDocId || isReviewed) return;
  document.getElementById('actionStatus').textContent = 'Saving…';
  const status = newStatus || appraisalDoc.status || 'draft';
  await setDoc(doc(window.db, 'school_appraisals_v2', appraisalDocId), {
    ratings: appraisalDoc.ratings || {},
    evidence: appraisalDoc.evidence || {},
    files: appraisalDoc.files || {},
    links: appraisalDoc.links || {},
    strengths: appraisalDoc.strengths || '',
    improvements: appraisalDoc.improvements || '',
    status, updatedAt: serverTimestamp(), updatedBy: window.currentUser?.email || ''
  }, { merge: true });
  appraisalDoc.status = status;
  document.getElementById('actionStatus').textContent = 'Saved ✓';
  updateTopbarStatus(); updateSidebarScores();
  if (newStatus === 'submitted') {
    document.getElementById('btnSubmit').style.display = 'none';
    document.getElementById('btnSaveDraft').style.display = 'none';
    showNotice('submitted');
  }
}
function scheduleSave() {
  document.getElementById('actionStatus').textContent = 'Unsaved changes';
  clearTimeout(saveTimer); saveTimer = setTimeout(() => saveAppraisal(), 4000);
}

function updateTopbarStatus() {
  const el = document.getElementById('topbarStatus');
  const s = appraisalDoc?.status || 'draft';
  el.className = 'topbar-status ' + { draft:'ts-draft', submitted:'ts-submitted', reviewed:'ts-reviewed' }[s];
  el.textContent = { draft:'In Progress', submitted:'Submitted', reviewed:'Reviewed' }[s] || s;
}

function updateSidebarScores() {
  if (!FRAMEWORK) return;
  FRAMEWORK.domains.forEach(d => {
    const avg = domainAvg(d.id);
    const { done, total } = domainCompletion(d.id);
    const col = domainColors[d.id];
    const bg  = domainBgs[d.id];
    // Score badge
    const badge = document.getElementById(`dnc-score-${d.id}`);
    if (badge) { badge.textContent = avg || '—'; badge.className = `dnc-score-badge ${avg ? scoreCls(parseFloat(avg)) : 's0'}`; }
    // Dots
    const dotsEl = document.getElementById(`dnc-dots-${d.id}`);
    if (dotsEl) {
      dotsEl.querySelectorAll('.dnc-dot').forEach((dot, i) => {
        const v = appraisalDoc?.ratings?.[d.aspects[i]?.id] || 0;
        dot.style.background = v > 0 ? col : '';
        dot.classList.toggle('done', v > 0);
      });
    }
    const cmpEl = document.getElementById(`dnc-cmp-${d.id}`);
    if (cmpEl) cmpEl.textContent = `${done}/${total}`;
  });
  const { done, total } = totalCompletion();
  const pct = total ? Math.round((done/total)*100) : 0;
  const fill = document.getElementById('sopFill'); if (fill) fill.style.width = pct + '%';
  const pctEl = document.getElementById('sopPct'); if (pctEl) pctEl.textContent = pct + '%';
  const cnt = document.getElementById('sopCount'); if (cnt) cnt.textContent = `${done}/${total} aspects`;
  // also update progress bar if on overview
  const phFill = document.getElementById('progressFill'); if (phFill) phFill.style.width = pct + '%';
  const phPct  = document.getElementById('progressPct');  if (phPct)  phPct.textContent  = pct + '%';
}

function showNotice(type) {
  const map = {
    submitted: { cls:'notice-success', msg:'Your self-appraisal has been submitted for review. An Eduversal coordinator will review and provide feedback.' },
    reviewed:  { cls:'notice-info',    msg:'This appraisal has been reviewed. The fields are now read-only. Contact Eduversal if you need to make amendments.' }
  };
  const n = map[type]; if (!n) return;
  const existing = document.getElementById('pageNotice'); if (existing) existing.remove();
  const el = document.createElement('div'); el.id = 'pageNotice'; el.className = `notice-bar ${n.cls}`; el.textContent = n.msg;
  document.getElementById('pageContent').prepend(el);
}

// ===== FILE UPLOAD =====
async function uploadFile(aspectId, file) {
  const storage = getStorage(window.firebaseApp);
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const path = `school_appraisals/${appraisalDocId}/${aspectId}/${Date.now()}_${safeName}`;
  const fileRef = storageRef(storage, path);
  const progressBar = document.querySelector(`#upload-progress-${aspectId} .upload-progress-bar`);
  const progressWrap = document.getElementById(`upload-progress-${aspectId}`);
  if (progressWrap) progressWrap.style.display = 'block';
  return new Promise((resolve, reject) => {
    const task = uploadBytesResumable(fileRef, file);
    task.on('state_changed',
      snap => { const pct = (snap.bytesTransferred / snap.totalBytes) * 100; if (progressBar) progressBar.style.width = pct + '%'; },
      err => { if (progressWrap) progressWrap.style.display = 'none'; reject(err); },
      async () => {
        const url = await getDownloadURL(task.snapshot.ref);
        if (progressWrap) progressWrap.style.display = 'none';
        resolve({ url, path, name: file.name, size: file.size });
      }
    );
  });
}

async function handleFileUpload(aspectId, file) {
  if (!file) return;
  const actionEl = document.getElementById('actionStatus');
  actionEl.textContent = 'Uploading…';
  try {
    const fileData = await uploadFile(aspectId, file);
    if (!appraisalDoc.files) appraisalDoc.files = {};
    if (!appraisalDoc.files[aspectId]) appraisalDoc.files[aspectId] = [];
    appraisalDoc.files[aspectId].push(fileData);
    renderFileList(aspectId);
    await saveAppraisal();
  } catch(e) {
    console.error('Upload failed', e);
    actionEl.textContent = 'Upload failed';
  }
}

async function removeFile(aspectId, idx) {
  const fileData = appraisalDoc.files?.[aspectId]?.[idx];
  if (!fileData) return;
  try {
    const storage = getStorage(window.firebaseApp);
    await deleteObject(storageRef(storage, fileData.path));
  } catch(_) {}
  appraisalDoc.files[aspectId].splice(idx, 1);
  renderFileList(aspectId);
  await saveAppraisal();
}
window.__removeFile = removeFile;

function renderFileList(aspectId) {
  const listEl = document.getElementById(`file-list-${aspectId}`);
  if (!listEl) return;
  const files = appraisalDoc.files?.[aspectId] || [];
  listEl.innerHTML = files.map((f, i) => {
    const ext = f.name.split('.').pop().toUpperCase();
    const sizeStr = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+'MB' : Math.round(f.size/1024)+'KB';
    return `
      <div class="file-item">
        <span class="file-item-icon">${ext === 'PDF' ? '📄' : ['JPG','JPEG','PNG'].includes(ext) ? '🖼️' : '📎'}</span>
        <span class="file-item-name" title="${f.name}">${f.name}</span>
        <span class="file-item-size">${sizeStr}</span>
        <a class="file-item-link" href="${f.url}" target="_blank" rel="noopener">View</a>
        <button class="file-item-remove" onclick="window.__removeFile('${aspectId}',${i})" title="Remove">✕</button>
      </div>`;
  }).join('');
}
window.__renderFileList = renderFileList;

// ===== RENDER OVERVIEW =====
function renderOverview() {
  const avg = overallAvg();
  const { done, total } = totalCompletion();
  const pct = total ? Math.round((done/total)*100) : 0;
  const canEdit = !isReviewed && appraisalDoc?.status !== 'submitted';

  const refs = FRAMEWORK.meta.references.map(r => {
    const name = r.name || r;
    const url = r.url || null;
    const label = name.match(/\(([^)]+)\)/)?.[1] || name.split(' ').slice(0,2).join(' ');
    return url
      ? `<a class="ref-pill" href="${url}" target="_blank" rel="noopener" title="${name}">${label}</a>`
      : `<span class="ref-pill" title="${name}">${label}</span>`;
  }).join('');

  const domainCards = FRAMEWORK.domains.map(d => {
    const davg = domainAvg(d.id);
    const { done: dDone, total: dTotal } = domainCompletion(d.id);
    const col = domainColors[d.id]; const bg = domainBgs[d.id];
    return `
      <div class="domain-card" onclick="window.__switchDomain('${d.id}')" style="border-color:${domainBorders[d.id]};">
        <div class="dc-top"><span class="dc-icon">${d.icon}</span><span class="dc-code" style="color:${col}">${d.code}</span></div>
        <div class="dc-title">${d.title}</div>
        <div class="dc-score-row">
          <div class="dc-score-bar"><div class="dc-score-fill" style="width:${davg?(parseFloat(davg)/4*100)+'%':'0%'};background:${col};"></div></div>
          <div class="dc-score-num" style="color:${col}">${davg||'—'}</div>
        </div>
        <div class="dc-completion">${dDone}/${dTotal} aspects rated</div>
      </div>`;
  }).join('');

  return `
    <div class="overview-hero">
      <div class="oh-eyebrow">Eduversal School Appraisal · ${appraisalDoc?.academicYear||'2025–2026'}</div>
      <h1 class="oh-title">${appraisalDoc?.schoolName||'Your School'}</h1>
      <p class="oh-sub">${FRAMEWORK.meta.description}</p>
      <div class="oh-score-row">
        <div class="oh-score-chip"><div class="oh-score-val">${avg||'—'}</div><div class="oh-score-label">Overall Score</div></div>
        <div class="oh-score-chip"><div class="oh-score-val">${pct}%</div><div class="oh-score-label">Completed</div></div>
        <div class="oh-score-chip"><div class="oh-score-val">${done}/${total}</div><div class="oh-score-label">Aspects Rated</div></div>
        <div class="oh-score-chip"><div class="oh-score-val">${FRAMEWORK.meta.rating_scale[Math.round(avg)]?.label||'—'}</div><div class="oh-score-label">Rating Level</div></div>
      </div>
    </div>

    <div class="ref-strip">
      <span class="ref-strip-label">International References:</span>
      ${refs}
    </div>

    <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;">
      <span style="font-size:12px;color:var(--ink-3);font-weight:500;white-space:nowrap;">Overall Completion</span>
      <div style="flex:1;height:7px;background:var(--paper-2);border-radius:99px;overflow:hidden;"><div id="progressFill" style="height:100%;background:var(--accent);border-radius:99px;transition:width .4s;width:${pct}%"></div></div>
      <span id="progressPct" style="font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;">${pct}%</span>
    </div>

    <div class="domain-grid">${domainCards}</div>

    <div style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:14px;">School Summary</div>
      <div class="overview-fields">
        <div class="field-block"><label>Key Strengths</label><textarea data-field="strengths" placeholder="What does your school do particularly well?" ${!canEdit?'disabled':''}>${appraisalDoc?.strengths||''}</textarea></div>
        <div class="field-block"><label>Areas for Improvement</label><textarea data-field="improvements" placeholder="What are your school's priority development areas?" ${!canEdit?'disabled':''}>${appraisalDoc?.improvements||''}</textarea></div>
      </div>
      ${appraisalDoc?.recommendations ? `<div class="field-block" style="margin-top:4px;"><label>Eduversal Coordinator Recommendations</label><textarea disabled style="min-height:80px;background:var(--d2-bg);border-color:var(--d2-border);">${appraisalDoc.recommendations}</textarea></div>` : ''}
    </div>`;
}

// ===== RENDER DOMAIN =====
function renderDomain(domainId) {
  const domain = FRAMEWORK.domains.find(d => d.id === domainId);
  if (!domain) return '';
  const col = domainColors[domainId]; const bg = domainBgs[domainId]; const border = domainBorders[domainId];
  const davg = domainAvg(domainId);
  const { done, total } = domainCompletion(domainId);
  const canEdit = !isReviewed && appraisalDoc?.status !== 'submitted';

  const aspectsHtml = domain.aspects.map((aspect, idx) => {
    const rating = appraisalDoc?.ratings?.[aspect.id] || 0;
    const evidence = appraisalDoc?.evidence?.[aspect.id] || '';
    const files = appraisalDoc?.files?.[aspect.id] || [];
    const badgeText = rating ? `${rating} — ${scoreLabel(rating)}` : 'Not rated';

    const ratingBtns = [1,2,3,4].map(v => {
      const scale = FRAMEWORK.meta.rating_scale[v];
      return `<button class="rating-btn${rating===v?` sel-${v}`:''}" value="${v}" data-aspect="${aspect.id}" ${!canEdit?'disabled':''} title="${scale.description}">${v} — ${scale.label}</button>`;
    }).join('');

    const scaleCards = [1,2,3,4].map(v => {
      const s = FRAMEWORK.meta.rating_scale[v];
      const guide = aspect.rating_scale_guide?.[v];
      return `<div class="rsi-item rsi-${v}">
        <div class="rsi-num">${v}</div>
        <div class="rsi-label">${s.label}</div>
        <div class="rsi-desc">${s.description}</div>
        ${guide ? `<div class="rsi-guide">${guide}</div>` : ''}
      </div>`;
    }).join('');

    const expectItems = aspect.expectations.map(e => `<li>${e}</li>`).join('');
    const hintItems   = aspect.evidence_examples.map(e => `<li>${e}</li>`).join('');
    const fileListHtml = files.map((f, i) => {
      const ext = f.name.split('.').pop().toUpperCase();
      const sizeStr = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+'MB' : Math.round(f.size/1024)+'KB';
      return `<div class="file-item"><span class="file-item-icon">${ext==='PDF'?'📄':['JPG','JPEG','PNG'].includes(ext)?'🖼️':'📎'}</span><span class="file-item-name" title="${f.name}">${f.name}</span><span class="file-item-size">${sizeStr}</span><a class="file-item-link" href="${f.url}" target="_blank" rel="noopener">View</a>${canEdit?`<button class="file-item-remove" onclick="window.__removeFile('${aspect.id}',${i})" title="Remove">✕</button>`:''}</div>`;
    }).join('');

    return `
      <div class="aspect-card" id="aspect-${aspect.id}">
        <div class="aspect-head">
          <div>
            <div class="aspect-num">${domain.code}.${idx+1}</div>
            <div class="aspect-title">${aspect.title}</div>
            <div class="aspect-desc">${aspect.description}</div>
          </div>
          <span class="aspect-score-badge ${scoreCls(rating)}" id="badge-${aspect.id}">${badgeText}</span>
        </div>
        <div class="aspect-body">

          <!-- Expectations -->
          <button class="collapsible-btn" onclick="window.__toggleBlock('exp-${aspect.id}',this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            What is expected (${aspect.expectations.length} criteria)
          </button>
          <div class="collapsible-block" id="exp-${aspect.id}">
            <ul class="expectations-inner">${expectItems}</ul>
          </div>

          <!-- Rating scale info -->
          <button class="collapsible-btn" onclick="window.__toggleBlock('scale-${aspect.id}',this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            Rating scale guide
          </button>
          <div class="collapsible-block" id="scale-${aspect.id}">
            <div style="padding:12px 14px;background:var(--paper);border-radius:10px;">
              <div class="rating-scale-info">${scaleCards}</div>
            </div>
          </div>

          <!-- Rating buttons -->
          <div class="rating-section-label">Self-Assessment Rating</div>
          <div class="rating-options" id="rating-${aspect.id}">${ratingBtns}</div>

          <!-- Evidence notes -->
          <div class="evidence-section-label">Evidence & Notes</div>
          <textarea class="evidence-textarea" data-aspect="${aspect.id}" placeholder="Describe the evidence that supports your rating. Be specific — refer to documents, data, or observations." ${!canEdit?'disabled':''}>${evidence}</textarea>

          <!-- Evidence examples -->
          <button class="collapsible-btn" onclick="window.__toggleBlock('hints-${aspect.id}',this)" style="margin-bottom:14px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            Evidence examples for this aspect
          </button>
          <div class="collapsible-block" id="hints-${aspect.id}">
            <ul class="hints-inner">${hintItems}</ul>
          </div>

          <!-- File upload -->
          ${canEdit ? `
          <div class="file-upload-section">
            <label class="file-upload-label">Evidence Files</label>
            <div class="drop-zone" id="dropzone-${aspect.id}" data-aspect="${aspect.id}">
              <span class="drop-zone-icon">📎</span>
              <div>
                <div class="drop-zone-text"><strong>Upload a file</strong> or drag and drop here</div>
                <div class="drop-zone-sub">PDF, Word, Excel, PowerPoint, images — max 20MB</div>
              </div>
            </div>
            <div class="upload-progress" id="upload-progress-${aspect.id}">
              <div class="upload-progress-bar" style="width:0%"></div>
            </div>
          </div>` : files.length ? `<div class="file-upload-section"><label class="file-upload-label">Evidence Files</label></div>` : ''}
          <div class="file-list" id="file-list-${aspect.id}">${fileListHtml}</div>

          <!-- Evidence links -->
          <div class="evidence-link-section">
            <label class="evidence-link-label">Evidence Links</label>
            ${canEdit ? `
            <div class="evidence-link-row">
              <input class="evidence-link-input" id="link-input-${aspect.id}" type="url" placeholder="https://drive.google.com/… or any evidence URL" />
              <button class="evidence-link-add-btn" onclick="window.__addLink('${aspect.id}')">+ Add Link</button>
            </div>` : ''}
            <div class="link-list" id="link-list-${aspect.id}">${(appraisalDoc?.links?.[aspect.id]||[]).map((l,i) => `
              <div class="link-item">
                <span class="link-item-icon">🔗</span>
                <a class="link-item-url" href="${l.url}" target="_blank" rel="noopener" title="${l.url}">${l.label||l.url}</a>
                ${canEdit ? `<button class="link-item-remove" onclick="window.__removeLink('${aspect.id}',${i})" title="Remove">✕</button>` : ''}
              </div>`).join('')}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="domain-header" style="background:${bg};border:1.5px solid ${border};">
      <div class="dh-top">
        <div class="dh-icon">${domain.icon}</div>
        <div class="dh-meta">
          <div class="dh-code" style="color:${col}">${domain.code}</div>
          <div class="dh-title" style="color:${col}">${domain.title}</div>
          <div class="dh-desc" style="color:${col}">${domain.description}</div>
        </div>
      </div>
      <div class="dh-bottom" style="background:${bg};">
        <div class="dh-stat" style="color:${col}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${done}/${total} aspects rated
        </div>
        <div class="dh-stat" style="color:${col}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          ${davg ? `Avg ${davg} — ${scoreLabel(Math.round(parseFloat(davg)))}` : 'Not yet rated'}
        </div>
        <div class="dh-refs">
          ${FRAMEWORK.meta.references.slice(0,3).map(r => {
            const name = r.name || r;
            const url = r.url || null;
            const label = name.match(/\(([^)]+)\)/)?.[1] || name.split(' ')[0];
            return url
              ? `<a class="dh-ref-tag" href="${url}" target="_blank" rel="noopener" title="${name}" style="text-decoration:none;">${label}</a>`
              : `<span class="dh-ref-tag" title="${name}">${label}</span>`;
          }).join('')}
        </div>
      </div>
    </div>
    ${aspectsHtml}
    <div class="domain-score-bar-wrap" style="border-color:${border};">
      <div class="dsb-label">Domain Average Score</div>
      <div class="dsb-val ${scoreCls(parseFloat(davg||0))}" id="domain-avg-${domainId}">
        ${davg ? `${davg} — ${scoreLabel(Math.round(parseFloat(davg)))}` : '—'}
      </div>
    </div>`;
}

// ===== SWITCH VIEW =====
function switchView(viewId) {
  currentView = viewId;
  document.getElementById('overviewNavBtn')?.classList.toggle('active', viewId === 'overview');
  document.querySelectorAll('.domain-nav-card').forEach(c => {
    const active = c.dataset.domain === viewId;
    const col = domainColors[c.dataset.domain] || '#6b7280';
    const bg  = domainBgs[c.dataset.domain]    || '#f3f4f6';
    const border = domainBorders[c.dataset.domain] || '#e0ddd6';
    c.classList.toggle('active', active);
    c.style.borderColor = active ? col : border;
    c.style.background  = active ? bg : '';
  });

  const content = document.getElementById('pageContent');
  const notice = document.getElementById('pageNotice');
  content.innerHTML = '';
  if (notice) content.appendChild(notice);
  content.insertAdjacentHTML('beforeend', viewId === 'overview' ? renderOverview() : renderDomain(viewId));

  if (viewId === 'overview') {
    content.querySelectorAll('textarea[data-field]').forEach(ta => {
      ta.addEventListener('input', () => { appraisalDoc[ta.dataset.field] = ta.value; scheduleSave(); });
    });
  } else {
    // Wire rating buttons
    content.querySelectorAll('.rating-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const aspectId = btn.dataset.aspect; const val = parseInt(btn.value);
        if (!appraisalDoc.ratings) appraisalDoc.ratings = {};
        appraisalDoc.ratings[aspectId] = val;
        const row = document.getElementById(`rating-${aspectId}`);
        row.querySelectorAll('.rating-btn').forEach(b => b.className = 'rating-btn');
        btn.className = `rating-btn sel-${val}`;
        const badge = document.getElementById(`badge-${aspectId}`);
        if (badge) { badge.textContent = `${val} — ${scoreLabel(val)}`; badge.className = `aspect-score-badge ${scoreCls(val)}`; }
        const davg = domainAvg(viewId);
        const avgEl = document.getElementById(`domain-avg-${viewId}`);
        if (avgEl) { avgEl.textContent = davg ? `${davg} — ${scoreLabel(Math.round(parseFloat(davg)))}` : '—'; avgEl.className = `dsb-val ${scoreCls(parseFloat(davg||0))}`; }
        updateSidebarScores(); scheduleSave();
      });
    });
    // Wire evidence textareas
    content.querySelectorAll('textarea.evidence-textarea').forEach(ta => {
      ta.addEventListener('input', () => { if (!appraisalDoc.evidence) appraisalDoc.evidence = {}; appraisalDoc.evidence[ta.dataset.aspect] = ta.value; scheduleSave(); });
    });
    // Wire evidence link inputs (Enter key)
    content.querySelectorAll('.evidence-link-input').forEach(inp => {
      const aspectId = inp.id.replace('link-input-', '');
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); window.__addLink(aspectId); } });
    });
    // Wire drop zones
    content.querySelectorAll('.drop-zone').forEach(zone => {
      const aspectId = zone.dataset.aspect;
      zone.addEventListener('click', () => { pendingUploadAspect = aspectId; document.getElementById('globalFileInput').click(); });
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', e => {
        e.preventDefault(); zone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) handleFileUpload(aspectId, file);
      });
    });
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== GLOBAL HELPERS =====
window.__switchDomain = id => switchView(id);
window.__toggleBlock = (id, btn) => {
  const el = document.getElementById(id); if (!el) return;
  el.classList.toggle('open'); btn?.classList.toggle('open');
};

function renderLinkList(aspectId) {
  const list = document.getElementById('link-list-' + aspectId);
  if (!list) return;
  const links = appraisalDoc?.links?.[aspectId] || [];
  const canEdit = !isReviewed && appraisalDoc?.status !== 'submitted';
  list.innerHTML = links.map((l, i) => `
    <div class="link-item">
      <span class="link-item-icon">🔗</span>
      <a class="link-item-url" href="${l.url}" target="_blank" rel="noopener" title="${l.url}">${l.label || l.url}</a>
      ${canEdit ? `<button class="link-item-remove" onclick="window.__removeLink('${aspectId}',${i})" title="Remove">✕</button>` : ''}
    </div>`).join('');
}

window.__addLink = (aspectId) => {
  const input = document.getElementById('link-input-' + aspectId);
  if (!input) return;
  let url = input.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  if (!appraisalDoc.links) appraisalDoc.links = {};
  if (!appraisalDoc.links[aspectId]) appraisalDoc.links[aspectId] = [];
  appraisalDoc.links[aspectId].push({ url, addedAt: new Date().toISOString() });
  input.value = '';
  renderLinkList(aspectId);
  scheduleSave();
};

window.__removeLink = (aspectId, idx) => {
  if (!appraisalDoc.links?.[aspectId]) return;
  appraisalDoc.links[aspectId].splice(idx, 1);
  renderLinkList(aspectId);
  scheduleSave();
};

// ===== BUILD SIDEBAR =====
function buildSidebar() {
  const container = document.getElementById('sidebarDomainBtns');
  FRAMEWORK.domains.forEach(d => {
    const col = domainColors[d.id]; const bg = domainBgs[d.id]; const border = domainBorders[d.id];
    const dots = d.aspects.map((a, i) => `<div class="dnc-dot" id="dnc-dot-${d.id}-${i}"></div>`).join('');
    const btn = document.createElement('button');
    btn.className = 'domain-nav-card'; btn.dataset.domain = d.id;
    btn.style.borderColor = border;
    btn.innerHTML = `
      <div class="dnc-top">
        <span class="dnc-icon">${d.icon}</span>
        <div style="flex:1;">
          <div class="dnc-code" style="color:${col}">${d.code}</div>
          <div class="dnc-title">${d.title}</div>
        </div>
        <span class="dnc-score-badge s0" id="dnc-score-${d.id}">—</span>
      </div>
      <div class="dnc-progress">
        <div class="dnc-dots" id="dnc-dots-${d.id}">${dots}</div>
        <span class="dnc-completion-txt" id="dnc-cmp-${d.id}">0/${d.aspects.length}</span>
      </div>`;
    btn.addEventListener('click', () => switchView(d.id));
    container.appendChild(btn);
  });
}

// ===== INIT =====
document.addEventListener('authReady', async ({ detail: { user, profile } }) => {
  window.__loadAcademicNavbar('school-appraisal', { user, profile });
  await loadFramework();
  const appraisal = await findOrCreateAppraisal(profile);
  document.getElementById('pageLoading').style.display = 'none';

  if (!appraisal) {
    document.getElementById('pageContent').style.display = 'block';
    document.getElementById('pageContent').innerHTML = `<div class="notice-bar notice-warning">Your account does not have a school assigned. Please contact your Eduversal coordinator to link your school to your profile before completing a self-appraisal.</div>`;
    return;
  }

  isReviewed = appraisal.status === 'reviewed';
  document.getElementById('topbarTitle').textContent = appraisal.schoolName || 'School Self-Appraisal';
  updateTopbarStatus();
  buildSidebar();

  document.getElementById('overviewNavBtn').addEventListener('click', () => switchView('overview'));

  const actionBar = document.getElementById('actionBar');
  if (!isReviewed && appraisal.status !== 'submitted') actionBar.style.display = 'flex';
  if (appraisal.status === 'submitted') {
    actionBar.style.display = 'flex';
    document.getElementById('btnSubmit').style.display = 'none';
    document.getElementById('actionStatus').textContent = 'Submitted — awaiting review';
  }

  document.getElementById('btnSaveDraft').addEventListener('click', () => saveAppraisal('draft'));
  document.getElementById('btnSubmit').addEventListener('click', async () => {
    const { done, total } = totalCompletion();
    if (done < total && !confirm(`You have only completed ${done} of ${total} aspects. Submit anyway?`)) return;
    await saveAppraisal('submitted');
  });

  // Global file input
  document.getElementById('globalFileInput').addEventListener('change', e => {
    const file = e.target.files?.[0];
    if (file && pendingUploadAspect) { handleFileUpload(pendingUploadAspect, file); pendingUploadAspect = null; }
    e.target.value = '';
  });

  document.getElementById('pageContent').style.display = 'block';
  switchView('overview');
  updateSidebarScores();
  if (isReviewed) showNotice('reviewed');
  else if (appraisal.status === 'submitted') showNotice('submitted');
});
</script>
</body>
