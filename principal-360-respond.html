<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Principal 360Â° â€” Respond â€” Academic Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23072a33'/><polygon points='10,45 50,65 50,70 10,50' fill='%23066c84'/><polygon points='90,45 50,65 50,70 90,50' fill='%230a7e9b'/><polygon points='50,25 90,45 50,65 10,45' fill='%230891b2'/><circle cx='76' cy='76' r='20' fill='%230891b2' stroke='%23072a33' stroke-width='3'/><text x='76' y='84' font-family='Georgia,serif' font-size='26' font-weight='bold' text-anchor='middle' fill='white'>A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="firebase-config.js"></script>
<script>if (!window.ENV) window.ENV = { FIREBASE_API_KEY: "__FIREBASE_API_KEY__", FIREBASE_AUTH_DOMAIN: "__FIREBASE_AUTH_DOMAIN__", FIREBASE_PROJECT_ID: "__FIREBASE_PROJECT_ID__", FIREBASE_STORAGE_BUCKET: "__FIREBASE_STORAGE_BUCKET__", FIREBASE_MESSAGING_SENDER_ID: "__FIREBASE_MESSAGING_SENDER_ID__", FIREBASE_APP_ID: "__FIREBASE_APP_ID__" };</script>
<style>
:root { --accent: #6c5ce7; --accent-2: #ede9fe; --accent-dk: #4e3db8;
  --ink: #1f2937; --ink-2: #4b5563; --ink-3: #6b7280;
  --border: #e5e7eb; --paper: #fafafa; --white: #ffffff;
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
}
* { box-sizing: border-box; }
body { margin: 0; padding-top: 62px; font-family: 'DM Sans', system-ui, sans-serif; background: var(--paper); color: var(--ink); }
.page-wrap { max-width: 820px; margin: 0 auto; padding: 28px 20px 80px; }

.page-header {
  background: linear-gradient(135deg, #1a1530 0%, #2d2354 55%, #0a0815 100%);
  color: #fff; padding: 32px 28px; border-radius: 16px; margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.page-header::before { content: ''; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 80% 20%, rgba(108,92,231,0.22) 0%, transparent 55%); }
.page-header > * { position: relative; z-index: 1; }
.page-header .eyebrow { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.page-header h1 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 600; margin: 0 0 6px; }
.page-header p { font-size: 14px; color: rgba(255,255,255,0.78); max-width: 700px; margin: 0; }

.charter-banner {
  background: linear-gradient(180deg, var(--accent-2) 0%, #fff 100%);
  border: 1px solid var(--accent); border-radius: 12px;
  padding: 14px 18px; margin-bottom: 20px; font-size: 13px; color: #4c1d95; line-height: 1.55;
}
.charter-banner strong { display: block; font-weight: 700; margin-bottom: 3px; color: #3b0764; }

.focus-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 14px;
  padding: 22px 24px; margin-bottom: 16px; box-shadow: var(--shadow-sm);
}
.focus-head { font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 600; margin: 0 0 14px; }
.focus-head .focus-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent-dk); padding: 2px 8px; background: var(--accent-2); border-radius: 4px; margin-right: 8px; vertical-align: middle; font-weight: 700; }

.q-row { padding: 12px 0; border-top: 1px solid var(--border); }
.q-row:first-of-type { border-top: none; padding-top: 4px; }
.q-text { font-size: 14px; color: var(--ink); margin-bottom: 10px; line-height: 1.55; }
.q-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-3); }

.scale-row { display: flex; flex-wrap: wrap; gap: 6px; }
.scale-pill {
  cursor: pointer; padding: 8px 12px; border: 2px solid var(--border);
  border-radius: 9px; background: var(--white); color: var(--ink-2);
  font-size: 12px; font-weight: 600; transition: all 0.12s;
  flex: 1 1 0; min-width: 100px; text-align: center;
}
.scale-pill:hover { border-color: var(--accent); }
.scale-pill.active.s4 { background: #d1fae5; border-color: #10b981; color: #065f46; }
.scale-pill.active.s3 { background: #cffafe; border-color: #0891b2; color: #155e75; }
.scale-pill.active.s2 { background: #fef3c7; border-color: #d97706; color: #92400e; }
.scale-pill.active.s1 { background: #fee2e2; border-color: #dc2626; color: #991b1b; }
.scale-pill.active.s0 { background: #f1f5f9; border-color: #475569; color: #475569; }

.notes-area {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-family: inherit; font-size: 13px; color: var(--ink); background: var(--paper);
  outline: none; resize: vertical; min-height: 80px; line-height: 1.55; margin-top: 8px;
}
.notes-area:focus { border-color: var(--accent); background: var(--white); }

.action-bar {
  position: sticky; bottom: 0; background: rgba(255,255,255,0.96);
  backdrop-filter: blur(10px); border-top: 1px solid var(--border);
  padding: 14px 20px; margin: 24px -20px 0;
  display: flex; gap: 12px; align-items: center; justify-content: flex-end;
}
.action-bar .progress-info { margin-right: auto; font-size: 12.5px; color: var(--ink-3); }
.btn { padding: 10px 22px; border: none; border-radius: 9px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: transform 0.1s, background 0.15s; }
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dk); }
.btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 11px 22px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #dc2626; }
.loading-state, .access-denied { text-align: center; padding: 80px 20px; color: var(--ink-3); }
.access-denied { color: #991b1b; }
.access-denied h2 { font-family: 'Lora', serif; color: #991b1b; margin-bottom: 8px; }
@media (max-width: 720px) {
  .page-header { padding: 22px 18px; }
  .focus-card { padding: 18px 16px; }
  .scale-pill { flex: 1 1 calc(50% - 6px); min-width: 0; padding: 9px 8px; font-size: 11.5px; }
  .action-bar { flex-wrap: wrap; }
  .action-bar .progress-info { flex: 1 100%; margin-bottom: 8px; }
}
.thanks { text-align: center; padding: 80px 20px; }
.thanks h2 { font-family: 'Lora', serif; font-size: 1.6rem; color: var(--accent-dk); margin-bottom: 12px; }
.thanks p { font-size: 14px; color: var(--ink-2); max-width: 520px; margin: 0 auto; line-height: 1.6; }
</style>
</head>
<body style="display:none">
<div id="navbarMount"></div>

<div class="page-wrap">
  <div class="page-header">
    <div class="eyebrow">Principal 360Â° Â· Anonymous feedback</div>
    <h1>Annual Leadership Review â€” Your Voice</h1>
    <p>Your responses are anonymous and combined with others before any human reads them. Min 5 respondents per cohort before any aggregate is shown to anyone (Charter NN5).</p>
  </div>
  <div id="content"><div class="loading-state">Loadingâ€¦</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="auth-guard.js"></script>
<script src="partials/navbar-loader.js"></script>
<script type="module">
import { collection, doc, getDoc, setDoc, addDoc, serverTimestamp, query, where, getDocs }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// URL params: ?cycle=<cycleId>&cohort=staff|parent|student
const params = new URLSearchParams(window.location.search);
const CYCLE_ID = params.get('cycle');
const COHORT   = params.get('cohort');

let framework = null;
let cycle = null;
let formData = { responses: {}, narratives: {} };

document.addEventListener('authReady', async ({ detail: { user, profile } }) => {
  if (typeof window.__loadAcademicNavbar === 'function') {
    window.__loadAcademicNavbar('principal-360-respond', { user, profile });
  }
  document.body.style.display = '';

  if (!CYCLE_ID || !COHORT) {
    showAccessDenied('Missing cycle or cohort parameter. Use the link emailed by your principal\'s office.');
    return;
  }

  try {
    // Fetch framework cross-origin
    const fwRes = await fetch('https://centralhub.eduversal.org/references-data/audits/principal-360-framework-v1.json');
    if (!fwRes.ok) throw new Error('Could not load framework (HTTP ' + fwRes.status + ')');
    framework = await fwRes.json();

    // Fetch cycle doc
    const cSnap = await getDoc(doc(window.db, 'principal_360_cycles', CYCLE_ID));
    if (!cSnap.exists()) {
      showAccessDenied('Survey cycle not found or already closed.');
      return;
    }
    cycle = cSnap.data();
    if (cycle.status !== 'open') {
      showAccessDenied('This survey cycle is ' + (cycle.status || 'closed') + '. No further responses are accepted.');
      return;
    }

    // Has this user already responded? (rough idempotency â€” anonymisation is by Cloud Function, but we hint here)
    const respondedKey = `360responded:${CYCLE_ID}:${user.uid}`;
    if (localStorage.getItem(respondedKey)) {
      showAccessDenied('You have already submitted a response for this cycle. Each respondent can submit once.');
      return;
    }

    render();
  } catch (err) {
    console.error('boot', err);
    document.getElementById('content').innerHTML = `<div class="access-denied"><h2>Could not load</h2><p>${escapeHtml(err.message || 'unknown error')}</p></div>`;
  }
});

function render() {
  const root = document.getElementById('content');
  const cohortDef = (framework.cohort_definitions || []).find(c => c.cohort_id === COHORT);
  const cohortLabel = cohortDef?.label || COHORT;

  const focusKeys = Object.keys(framework.question_bank || {}).filter(k => k.startsWith('p'));
  const focusCards = focusKeys.map(fk => {
    const focus = framework.question_bank[fk];
    const qs = (focus?.questions?.[COHORT]) || [];
    if (!qs.length) return '';
    const fId = fk.split('_')[0].toUpperCase();
    const fLabel = fk.split('_').slice(1).join(' ').replace(/\b\w/g, c => c.toUpperCase());
    return `
      <div class="focus-card">
        <h2 class="focus-head"><span class="focus-id">${escapeHtml(fId)}</span>${escapeHtml(fLabel)}</h2>
        ${qs.map(q => renderQuestion(q)).join('')}
      </div>
    `;
  }).join('');

  const narrativeFields = (framework.narrative_fields || []).filter(nf =>
    !nf.cohorts || nf.cohorts.includes(COHORT) || nf.cohorts.includes('all')
  );

  root.innerHTML = `
    <div class="charter-banner">
      <strong>You are responding as: ${escapeHtml(cohortLabel)}</strong>
      ${escapeHtml(framework.question_bank?.common_instructions_to_respondents || 'Your responses are anonymous and aggregated. No individual response is identifiable.')}
    </div>

    ${focusCards}

    ${narrativeFields.length ? `
      <div class="focus-card">
        <h2 class="focus-head">Open feedback</h2>
        ${narrativeFields.map(nf => `
          <div style="margin-bottom: 14px;">
            <label style="display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px;">${escapeHtml(nf.label)}${nf.required ? ' *' : ''}</label>
            ${nf.description ? `<p style="font-size:11.5px;color:var(--ink-3);margin:0 0 6px;line-height:1.5;">${escapeHtml(nf.description)}</p>` : ''}
            <textarea aria-label="${escapeAttr(nf.label)}â€¦" class="notes-area" data-narr="${escapeAttr(nf.id)}" placeholder="${escapeAttr(nf.label)}â€¦"></textarea>
          </div>
        `).join('')}
      </div>
    ` : ''}

    <div class="action-bar">
      <div class="progress-info" id="progressInfo">â€”</div>
      <button class="btn btn-primary" id="btnSubmit">Submit responses</button>
    </div>
  `;

  // Wire scale pills
  document.querySelectorAll('[data-q-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      const qId  = btn.dataset.qId;
      const sc   = Number(btn.dataset.score);
      formData.responses[qId] = sc;
      btn.parentElement.querySelectorAll('.scale-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateProgress();
    });
  });
  // Wire narrative
  document.querySelectorAll('[data-narr]').forEach(ta => {
    ta.addEventListener('input', e => { formData.narratives[ta.dataset.narr] = e.target.value; updateProgress(); });
  });
  document.getElementById('btnSubmit').addEventListener('click', submit);
  updateProgress();
}

function renderQuestion(q) {
  const scale = framework.scoring_scale || [];
  const cur = formData.responses[q.id];
  const pills = scale.map(opt => {
    const v = opt.value;
    return `<button class="scale-pill s${v} ${cur === v ? 'active' : ''}" data-q-id="${escapeAttr(q.id)}" data-score="${v}" type="button">${escapeHtml(opt.label)}</button>`;
  }).join('');
  return `
    <div class="q-row">
      <div class="q-text"><span class="q-id">${escapeHtml(q.id)}</span> Â· ${escapeHtml(q.text)}</div>
      <div class="scale-row">${pills}</div>
    </div>
  `;
}

function updateProgress() {
  const totalQs = countQuestionsForCohort();
  const answered = Object.keys(formData.responses).length;
  const info = document.getElementById('progressInfo');
  if (info) info.innerHTML = `<strong>${answered}/${totalQs}</strong> answered`;
}

function countQuestionsForCohort() {
  const qb = framework.question_bank || {};
  return Object.keys(qb).filter(k => k.startsWith('p'))
    .reduce((a, k) => a + ((qb[k].questions || {})[COHORT] || []).length, 0);
}

async function submit() {
  const total = countQuestionsForCohort();
  const answered = Object.keys(formData.responses).length;
  if (answered === 0) { toast('Answer at least one question before submitting.', true); return; }
  if (answered < total && !confirm(`You have answered ${answered} of ${total} questions. Submit anyway?`)) return;

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;

  try {
    // Anonymous response: write into principal_360_responses with no respondent uid.
    // The respondent's auth.uid is used only to enforce 1-response-per-cycle via the
    // local idempotency key. The persisted doc has NO respondent identifier â€” Cloud
    // Function aggregator (planned) reads only cohort + scores.
    await addDoc(collection(window.db, 'principal_360_responses'), {
      cycleId: CYCLE_ID,
      principalUid: cycle.principalUid,
      schoolId: cycle.schoolId || null,
      cohort: COHORT,
      responses: formData.responses,
      narratives: formData.narratives,
      submittedAt: serverTimestamp(),
    });
    localStorage.setItem(`360responded:${CYCLE_ID}:${window.currentUser.uid}`, '1');

    document.getElementById('content').innerHTML = `
      <div class="thanks">
        <h2>Thank you</h2>
        <p>Your response has been recorded anonymously. Aggregate results will be shared with the principal once the minimum threshold of 5 respondents per cohort is reached.</p>
      </div>
    `;
  } catch (err) {
    console.error('submit', err);
    toast('Could not submit: ' + (err.message || err.code), true);
    btn.disabled = false;
  }
}

function showAccessDenied(msg) {
  document.body.style.display = '';
  document.getElementById('content').innerHTML = `<div class="access-denied"><h2>Cannot open survey</h2><p>${escapeHtml(msg)}</p></div>`;
}
function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.toggle('error', !!isErr); t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }
</script>
</body>
</html>
