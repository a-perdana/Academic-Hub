            <div style={{ padding: "22px 28px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
                <div style={{ fontSize: "32px" }}>{rec.icon}</div>
                <div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "8px", marginBottom: "8px", alignItems: "center" }}>
                    <span style={styles.categoryBadge}>{rec.category}</span>
                    <span style={styles.urgencyBadge(rec.urgency)}>{rec.urgency}</span>
                  </div>
                  <div style={{ fontSize: "18px", fontWeight: "800", color: "#1e293b" }}>{rec.title}</div>
                  <div style={{ fontSize: "13px", color: "#6b7280", marginTop: "4px" }}>For: {rec.who}</div>
                </div>
              </div>
              <div style={{ fontSize: "20px", color: "#9ca3af" }}>{expandedRec === rec.id ? "▲" : "▼"}</div>
            </div>

            {expandedRec === rec.id && (
              <div style={{ padding: "0 28px 28px", borderTop: "1px solid #f1f5f9" }}>
                <div style={{ paddingTop: "20px" }} />
                <div style={styles.grid2}>
                  <div>
                    <div style={styles.sectionLabel}>What this means</div>
                    <p style={{ fontSize: "14px", color: "#374151", lineHeight: 1.7 }}>{rec.what}</p>
                    <div style={{ height: "16px" }} />
                    <div style={styles.sectionLabel}>Why it matters</div>
                    <p style={{ fontSize: "14px", color: "#374151", lineHeight: 1.7 }}>{rec.why}</p>
                  </div>
                  <div>
                    <div style={styles.sectionLabel}>How to do it — step by step</div>

                      <div key={j} style={{ display: "flex", gap: "12px", padding: "10px 0", borderBottom: "1px solid #f8fafc", fontSize: "14px", color: "#374151", lineHeight: 1.6 }}>

                          minWidth: "28px", height: "28px",

                          color: "#fff", fontSize: "12px", fontWeight: "800", flexShrink: 0
                        }}>{j + 1}</div>
                        <span>{step}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    );
  };

          { label: "Check all legal documents are current", detail: "Government licence to operate, fire certificates, health & safety documentation, staff background check records, copyright policy." },
          { label: "Update your policies", detail: "Review and, if needed, create: Academic Honesty Policy, Behaviour Policy, Safeguarding Policy, Child Protection Policy. These should be written, not just practised." },
          { label: "Walk through your facilities", detail: "Visit every science lab with a safety checklist. Check circuit breakers, fire extinguishers, first aid kits, eye protection, chemical storage, fume cupboards, emergency showers." },
          { label: "Review your exam storage room", detail: "Is it windowless? Double doors? Metal cabinets bolted to wall/floor? Are key holders limited to exam officer and principal only? Document this." },
        ]
      },
      {
        title: "Document Your Strengths",
        icon: "✅",
        color: "#059669",
        items: [
          { label: "Collect evidence of teaching quality", detail: "Lesson observation records, PLC meeting minutes, teacher CPD certificates, lesson plans showing varied strategies." },
          { label: "Show your assessment system", detail: "Internal exam schedules, sample marked work, data on formative and summative results, evidence of how results inform teaching changes." },
          { label: "Evidence community engagement", detail: "Parent communication records, photos from events, parent council meeting minutes, parent feedback forms." },
          { label: "Show professional development", detail: "CPD records for all staff, attendance at Cambridge training, mentor–mentee records, PLC focus topics and outcomes." },
          { label: "Document student outcomes", detail: "Most recent Checkpoint and IGCSE results. Analysis by subject and topic. Evidence of what you did with the data." },
        ]
      },
      {
        title: "During the Visit — What Reviewers Do",
        icon: "👁",
        color: "#7c3aed",
        items: [
          { label: "Classroom observations", detail: "Reviewers observe 2–3 lessons. They look for: clear lesson objectives, student engagement, mix of teaching strategies, questioning, evidence of formative assessment." },
          { label: "Interviews with stakeholders", detail: "Reviewers may interview teachers, students, and parents. They want to hear consistent messages about values, expectations, and quality." },
          { label: "Document review", detail: "They will ask to see policies, plans, and evidence for each Quality Standard. Having organised folders saves time and shows preparedness." },
          { label: "Facility walkthrough", detail: "Labs, library, exam room, classrooms, outdoor spaces. They check safety equipment is present and functional — not just that it exists somewhere." },
          { label: "Leadership meeting", detail: "The principal and senior team discuss the school's strategic plans, development areas, and how the school uses data to improve." },
        ]
      },
      {
        title: "What Makes the Difference — Top 5 Tips",
        icon: "🌟",
        color: "#f59e0b",
        items: [
          { label: "Write down what you already do well", detail: "Many schools pass in practice but struggle to demonstrate it. If your teachers do excellent work, make sure there is written evidence — lesson observation records, CPD logs, meeting minutes." },
          { label: "Brief your staff and students", detail: "Before the visit, remind teachers what the school values, what CPD they have done, and what good practice looks like. Students should be able to explain what they are learning and why." },
          { label: "Don't create policies just for the visit", detail: "Reviewers can tell when a policy was written last week. Develop policies over time and make sure staff actually use them." },
          { label: "Show your improvement journey", detail: "Cambridge wants to see that you identify development areas and work on them. Showing that you have acted on previous recommendations is powerful evidence." },
          { label: "Prepare your exam room", detail: "Check every detail: keys, cabinet bolts, door condition, written record of who can access. This is a standard where the difference between pass and fail is in specific, checkable details." },
        ]
      },
    ];

    const labChecklist = [
      "Circuit breaker(s) clearly visible and labelled", "Electric sockets not positioned near water sources",
      "First aid kit present, in-date, and accessible", "Fire extinguisher present and within service date",
      "Eye-wash station or shower installed and signposted", "Goggles/eye protection available for all students",
      "Chemicals stored in locked cupboard or separate storage room", "Fume cupboard installed (chemistry labs) — last service date recorded",
      "Portable Bunsen burners (if used) stored securely", "Gas installation checked and compliant (chemistry)",
      "Emergency shower installed and clearly signposted", "Lab safety rules displayed on wall",
      "Lab technician (or named responsible staff) identifiable", "Regular maintenance log maintained and up to date",
    ];

    const examChecklist = [
      "Storage room is windowless", "Double-door entry (e.g. metal grille + solid door)",
      "Metal cabinets bolted to wall AND floor", "Keys held ONLY by exam officer and principal",
      "Access log maintained for every entry", "Written SOP exists for receipt of exam materials",
      "Written SOP exists for exam day procedures", "Written SOP exists for return/dispatch of scripts",
      "Contingency plan documented for emergencies", "Staff trained and briefed before each examination session",

              <div key={i} style={{ display: "flex", gap: "12px", padding: "8px 0", borderBottom: "1px solid #f1f5f9", fontSize: "13px", color: "#374151", lineHeight: 1.5 }}>

            {examChecklist.map((item, i) => (
              <div key={i} style={{ display: "flex", gap: "12px", padding: "8px 0", borderBottom: "1px solid #f1f5f9", fontSize: "13px", color: "#374151", lineHeight: 1.5 }}>
                <div style={{ width: "20px", height: "20px", border: "2px solid #1e3a5f", borderRadius: "4px", flexShrink: 0, marginTop: "1px" }} />
                <span>{item}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

  // ── RENDER ────────────────────────────────────
  return (
    <div style={styles.container}>
      {/* Header */}
      <div style={styles.header}>
        <div style={styles.badge}>Cambridge Quality Standards · SRV Synthesis · 6 Schools · Indonesia</div>
        <h1 style={styles.title}>Cambridge School Quality Dashboard</h1>
        <p style={styles.subtitle}>
          Insights and recommendations from six recent Cambridge re-approval and quality assurance visits at Eduversal partner schools. For school leadership teams — plain language, actionable guidance.
        </p>
        <div style={styles.metaRow}>
          <span style={styles.metaPill("#1e3a5f")}>🗓 Aug–Oct 2025</span>
          <span style={styles.metaPill("#059669")}>5 of 6 Approved</span>
          <span style={styles.metaPill("#7c3aed")}>10 Quality Standards</span>
          <span style={styles.metaPill("#dc2626")}>9 Priority Recommendations</span>
        </div>
      </div>

      {/* Tabs */}
      <div style={styles.tabContainer}>
        <Tab id="overview" label="📊 Overview" />
        <Tab id="schools" label="🏫 6 Schools" />
        <Tab id="standards" label="📋 10 Standards" />
        <Tab id="themes" label="⚡ Development Themes" />
        <Tab id="recommendations" label="✅ Recommendations" />
        <Tab id="prep" label="🎯 Preparation Guide" />
      </div>

      {/* Tab content */}
      {activeTab === "overview" && <OverviewTab />}
      {activeTab === "schools" && <SchoolsTab />}
      {activeTab === "standards" && <StandardsTab />}
      {activeTab === "themes" && <ThemesTab />}
      {activeTab === "recommendations" && <RecommendationsTab />}
      {activeTab === "prep" && <PrepGuideTab />}

      {/* Footer */}
      <div style={{ marginTop: "60px", textAlign: "center" }}>
        <div style={{
          display: "inline-block",
          background: "linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #7c3aed 100%)",
          color: "#fff",
          padding: "18px 36px",
          borderRadius: "50px",
          boxShadow: "0 10px 30px rgba(37,99,235,0.3)",
          fontSize: "14px",
          fontWeight: "700",
          lineHeight: 1.6,

          Cambridge School Quality · 6 Schools · 10 Standards · 9 Priority Recommendations<br />
          <span style={{ fontSize: "12px", opacity: 0.85 }}>Synthesis based on SRV documents from August–October 2025 visits in Indonesia</span>
        </div>
      </div>

};
