<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surveys - Academic Hub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
  <style>
    /* Page-specific accent override (mor). Tokens, reset, and base
       typography come from /base.css (injected by build.js). */
    :root {
      --accent:      #6c5ce7;
      --accent-2:    #ece8ff;
      --accent-dark: #4f46e5;
    }
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 90px 20px 80px;
    }

    /* ─── HERO ───────────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, #6c5ce7 0%, #4f46e5 50%, #7c3aed 100%);
      border: none;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(108,92,231,.35);
      padding: 32px 28px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      pointer-events: none;
    }
    .hero::after {
      content: "";
      position: absolute;
      bottom: -60px; left: 40px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,.04);
      pointer-events: none;
    }
    .hero h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      color: #ffffff;
      letter-spacing: -0.01em;
      position: relative;
    }
    .hero p {
      font-size: 0.95rem;
      color: rgba(255,255,255,.82);
      line-height: 1.65;
      position: relative;
    }
    .hero-note {
      display: inline-block;
      margin-top: 16px;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      position: relative;
    }

    /* ─── CONTROLS BAR ───────────────────────────────── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 170px;
      gap: 10px;
      margin-bottom: 18px;
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      padding: 12px 14px;
    }
    .input,
    .select {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--paper);
      border-radius: 9px;
      padding: 0 13px;
      height: 44px;
      font-size: 0.88rem;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input:focus,
    .select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,92,231,.12);
      background: var(--white);
    }

    /* ─── SURVEY LIST ────────────────────────────────── */
    .survey-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── SURVEY CARD ────────────────────────────────── */
    .survey-card {
      background: var(--white);
      border: 1px solid #e8e4f4;
      border-left: 4px solid var(--accent);
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .survey-card:hover {
      box-shadow: 0 8px 28px rgba(108,92,231,.14);
      transform: translateY(-2px);
    }
    .survey-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 18px 20px 12px;
      background: linear-gradient(to right, rgba(108,92,231,.06), transparent);
    }
    .survey-title {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--ink);
    }
    .badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .badge-open {
      background: #dcfce7;
      color: #166534;
    }
    .badge-open::before {
      content: "●";
      margin-right: 4px;
      font-size: 0.6em;
      vertical-align: middle;
    }
    .badge-closed { background: #fee2e2; color: #991b1b; }
    .badge-status { background: #ede9fe; color: #5b21b6; }

    /* ─── CARD BODY ──────────────────────────────────── */
    .survey-body {
      color: var(--ink-2);
      font-size: 0.89rem;
      line-height: 1.65;
      margin-bottom: 14px;
      word-break: break-word;
      padding: 0 20px;
    }

    /* ─── QUESTIONS PREVIEW ──────────────────────────── */
    .questions-wrap {
      background: #faf9ff;
      border-left: 3px solid var(--accent);
      border-top: none;
      border-right: none;
      border-bottom: none;
      border-radius: 0 8px 8px 0;
      padding: 12px 14px 12px 16px;
      margin: 0 20px 14px;
    }
    .questions-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .questions-list {
      margin-left: 18px;
      color: var(--ink-2);
      font-size: 0.86rem;
      line-height: 1.7;
    }
    .questions-list li + li { margin-top: 4px; }

    /* ─── PLATFORM CHIPS ─────────────────────────────── */
    .platforms {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 20px 14px;
    }
    .chip {
      border-radius: 999px;
      padding: 3px 11px;
      font-size: 0.71rem;
      font-weight: 600;
      border: 1px solid transparent;
    }
    .chip-on-academic { background: #e0e7ff; color: #3730a3; border-color: #c7d2fe; }
    .chip-on-central  { background: #ede9fe; color: #5b21b6; border-color: #c4b5fd; }
    .chip-on-teachers { background: #dcfce7; color: #166534; border-color: #86efac; }
    .chip-off         { background: #f3f4f6; color: #9ca3af; border-color: #e5e7eb; }

    /* ─── CARD META FOOTER ───────────────────────────── */
    .survey-meta {
      font-size: 0.79rem;
      color: var(--ink-3);
      background: #f7f6f3;
      border-top: 1px solid #ece9e3;
      padding: 10px 20px;
    }

    /* ─── RESPONSE SECTION ───────────────────────────── */
    .response-wrap {
      background: linear-gradient(135deg, #faf9ff 0%, #f0edff 100%);
      border: 1px solid #e0d9ff;
      border-radius: 12px;
      margin: 0 20px 20px;
      padding: 18px;
      display: grid;
      gap: 10px;
    }
    .response-title {
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--accent);
      font-weight: 800;
    }
    .response-title::before {
      content: "●";
      display: inline-block;
      margin-right: 6px;
      font-size: 0.7em;
      vertical-align: middle;
      opacity: 0.9;
    }
    .response-item {
      display: grid;
      gap: 6px;
    }
    .response-item + .response-item {
      border-top: 1px solid #e0d9ff;
      padding-top: 14px;
      margin-top: 2px;
    }
    .response-label {
      font-size: 0.88rem;
      color: var(--ink-2);
      font-weight: 600;
    }
    .response-label strong,
    .response-label [data-qnum] {
      color: var(--accent);
    }
    .response-input {
      width: 100%;
      min-height: 68px;
      resize: vertical;
      border: 1px solid #d4ccf5;
      background: var(--white);
      border-radius: 9px;
      padding: 10px 12px;
      font-size: 0.85rem;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      line-height: 1.55;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .response-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,92,231,.12);
    }
    .response-input:disabled {
      background: #f0eeff;
      color: #8878bb;
    }
    .response-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .response-btn {
      border: none;
      border-radius: 12px;
      padding: 0 24px;
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #6c5ce7, #4f46e5);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 4px 14px rgba(108,92,231,.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }
    .response-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(108,92,231,.45);
    }
    .response-btn:active:not(:disabled) { transform: translateY(0); }
    .response-btn:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }
    .response-note {
      font-size: 0.78rem;
      color: var(--ink-3);
    }
    .response-note.ok  { color: #166534; }
    .response-note.err { color: #b91c1c; }

    /* ─── MULTI-CHOICE ───────────────────────────────── */
    .response-mc { display: flex; flex-direction: column; gap: 8px; }
    .response-mc label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.87rem;
      color: var(--ink-2);
      cursor: pointer;
      padding: 12px 16px;
      min-height: 48px;
      border: 1.5px solid #d4ccf5;
      border-radius: 9px;
      background: var(--white);
      transition: border-color 0.15s, background 0.15s;
    }
    .response-mc label:hover { border-color: var(--accent); background: var(--accent-2); }
    .response-mc label:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-2);
      font-weight: 700;
      color: var(--ink);
    }
    .response-mc input[type="radio"] { accent-color: var(--accent); flex-shrink: 0; }
    .response-mc label.disabled-label { cursor: not-allowed; opacity: 0.6; }

    /* ─── STAR RATING ────────────────────────────────── */
    .response-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 3px; margin: 4px 0; }
    .response-rating input[type="radio"] { display: none; }
    .response-rating label { font-size: 2rem; cursor: pointer; color: #d1d5db; transition: color 0.1s; line-height: 1; }
    .response-rating label:hover { color: #f59e0b; }
    .response-rating label:hover ~ label { color: #f59e0b; }
    .response-rating input:checked + label { color: #f59e0b; }
    .response-rating input:checked + label ~ label { color: #f59e0b; }
    .rating-disabled label { cursor: not-allowed; pointer-events: none; opacity: 0.7; }

    /* ─── LIKERT ─────────────────────────────────────── */
    .response-likert { display: flex; gap: 6px; flex-wrap: wrap; }
    .likert-opt { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 82px; }
    .likert-opt input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .likert-opt label {
      width: 100%;
      text-align: center;
      font-size: 0.72rem;
      padding: 14px 6px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #d4ccf5;
      border-radius: 9px;
      cursor: pointer;
      color: var(--ink-2);
      background: var(--white);
      transition: all 0.15s;
      line-height: 1.35;
    }
    .likert-opt label:hover { border-color: var(--accent); background: var(--accent-2); }
    .likert-opt:has(input:checked) label {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .likert-disabled .likert-opt label { cursor: not-allowed; opacity: 0.65; pointer-events: none; }

    /* ─── SECTION HEADER ─────────────────────────────── */
    .response-section-header {
      font-size: 0.71rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 10px 0 4px;
      border-top: 1.5px dashed #ccc5f0;
      margin-top: 8px;
    }

    /* ─── QUESTION TYPE CHIPS ────────────────────────── */
    .q-type-chip { display: inline-flex; align-items: center; font-size: 0.63rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
    .q-type-chip-mc     { background: #ede9fe; color: #5b21b6; }
    .q-type-chip-rating { background: #fef3c7; color: #92400e; }
    .q-type-chip-likert { background: #dcfce7; color: #166534; }

    /* ─── EMPTY STATE ────────────────────────────────── */
    .empty {
      background: var(--white);
      border: 2px dashed #d4ccf5;
      border-radius: 14px;
      padding: 48px 20px;
      text-align: center;
      color: var(--ink-3);
      font-size: 0.92rem;
    }

    /* ─── SHIMMER LOADER ─────────────────────────────── */
    .loading-line {
      height: 12px;
      border-radius: 8px;
      background: linear-gradient(90deg, #e8e5f2 25%, #f4f3f8 50%, #e8e5f2 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .survey-card:has(.loading-line) {
      padding: 20px;
      border-left-color: #d4ccf5;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 760px) {
      .controls { grid-template-columns: 1fr; }
      .response-likert { flex-direction: column; }
      .likert-opt { min-width: unset; flex-direction: row; }
      .likert-opt label { text-align: left; padding: 10px 12px; min-height: 44px; justify-content: flex-start; }
    }

  </style>
</head>
<body>
  <div id="navbarMount"></div>

  <main class="page-wrap">
    <section class="hero">
      <h1>Shared Surveys</h1>
      <p>Surveys created in CentralHub appear here when Academic Hub is selected during publishing.</p>
      <div class="hero-note">Only surveys shared to Academic Hub are listed.</div>
    </section>

    <section class="controls" aria-label="Survey filters">
      <input id="searchInput" class="input" type="text" placeholder="Search surveys, descriptions, or questions...">
      <select id="statusFilter" class="select">
        <option value="all">All</option>
        <option value="open">Open</option>
        <option value="closed">Closed</option>
      </select>
    </section>

    <section id="surveyList" class="survey-list" aria-live="polite">
      <article class="survey-card" aria-hidden="true">
        <div class="loading-line" style="width: 52%; margin-bottom: 10px;"></div>
        <div class="loading-line" style="width: 100%; margin-bottom: 8px;"></div>
        <div class="loading-line" style="width: 78%;"></div>
      </article>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script>
    if (!window.ENV) window.ENV = {
      FIREBASE_API_KEY: "__FIREBASE_API_KEY__",
      FIREBASE_AUTH_DOMAIN: "__FIREBASE_AUTH_DOMAIN__",
      FIREBASE_PROJECT_ID: "__FIREBASE_PROJECT_ID__",
      FIREBASE_STORAGE_BUCKET: "__FIREBASE_STORAGE_BUCKET__",
      FIREBASE_MESSAGING_SENDER_ID: "__FIREBASE_MESSAGING_SENDER_ID__",
      FIREBASE_APP_ID: "__FIREBASE_APP_ID__",
    };
  </script>
  <script src="partials/navbar-loader.js"></script>
  <script type="module" src="auth-guard.js"></script>
  <script type="module">
    import {
      collection, getDocs,
      doc, getDoc, setDoc, serverTimestamp,
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const PLATFORM_KEY = "academichub";
    const LIKERT_LABELS = ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"];

    let db;
    let currentUser = null;
    let allSurveys = [];
    let myResponses = {};
    let responseUiState = {};
    let savingSurveyId = null;
    let searchText = "";
    let statusFilter = "all";
    let controlsBound = false;

    document.addEventListener("authReady", async ({ detail: { user, profile } }) => {
      window.__loadAcademicNavbar("surveys", { user, profile });
      db = window.db;
      currentUser = user;
      bindControls();
      await loadSurveys();
    });

    function bindControls() {
      if (controlsBound) return;
      controlsBound = true;

      let _surveySearchTimer = null;
      document.getElementById("searchInput").addEventListener("input", (e) => {
        searchText = e.target.value.trim().toLowerCase();
        clearTimeout(_surveySearchTimer);
        _surveySearchTimer = setTimeout(() => renderSurveys(), 300);
      });

      document.getElementById("statusFilter").addEventListener("change", (e) => {
        statusFilter = e.target.value;
        renderSurveys();
      });

      document.getElementById("surveyList").addEventListener("click", async (e) => {
        const btn = e.target.closest(".response-btn");
        if (!btn) return;

        const surveyId = btn.dataset.surveyId;
        const survey = allSurveys.find((s) => s.id === surveyId);
        if (!survey) return;

        const status = normalizeStatus(survey.status);
        const isOpen = status === "published" && survey.allowResponses !== false;
        if (!isOpen || savingSurveyId) return;

        const card = btn.closest(".survey-card");
        if (!card) return;

        const questions = getQuestions(survey.questionsRaw, survey.questions);
        const answers = questions.map((q, idx) => {
          if (!q.type || q.type === "text") {
            const el = card.querySelector(`textarea.response-input[data-survey-id="${surveyId}"][data-qidx="${idx}"]`);
            return el ? el.value.trim() : "";
          }
          const checked = card.querySelector(`input[name="resp-${surveyId}-${idx}"]:checked`);
          return checked ? checked.value : "";
        });

        if (!answers.length || answers.some((x) => !x)) {
          setResponseUi(surveyId, "Please answer all questions before submitting.", true);
          renderSurveys();
          return;
        }

        await saveResponse(survey, answers);
      });
    }

    async function loadSurveys() {
      const listEl = document.getElementById("surveyList");
      try {
        // @lint-allow-unbounded — auto-annotated; revisit if collection grows large
        const snap = await getDocs(collection(db, "surveys"));
        allSurveys = snap.docs
          .map((d) => ({ id: d.id, ...d.data() }))
          .filter((s) => {
            const status = normalizeStatus(s.status);
            if (status === "draft") return false;
            const plats = s.platforms;
            if (!plats) return true; // no platforms field = visible to all
            return Array.isArray(plats) && plats.includes(PLATFORM_KEY);
          })
          .sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
        await loadMyResponses();
        renderSurveys();
      } catch (err) {
        console.error("Failed to load surveys:", err);
        listEl.innerHTML = '<div class="empty">Could not load surveys.</div>';
      }
    }

    async function loadMyResponses() {
      myResponses = {};
      if (!currentUser || !allSurveys.length) return;

      const tasks = allSurveys.map(async (survey) => {
        const responseRef = doc(db, "survey_responses", buildResponseDocId(survey.id, currentUser.uid));
        const snap = await getDoc(responseRef);
        if (snap.exists()) myResponses[survey.id] = snap.data();
      });
      await Promise.all(tasks);
    }

    async function saveResponse(survey, answers) {
      const surveyId = survey.id;
      savingSurveyId = surveyId;
      setResponseUi(surveyId, "", false);
      renderSurveys();

      try {
        const responseRef = doc(db, "survey_responses", buildResponseDocId(surveyId, currentUser.uid));
        const alreadyExists = !!myResponses[surveyId];
        const payload = {
          surveyId,
          userId: currentUser.uid,
          platform: PLATFORM_KEY,
          answers,
          authorName: window.userProfile?.displayName || currentUser.displayName || "",
          authorEmail: currentUser.email || "",
          updatedAt: serverTimestamp(),
        };
        if (!alreadyExists) payload.createdAt = serverTimestamp();

        await setDoc(responseRef, payload, { merge: true });

        const savedSnap = await getDoc(responseRef);
        if (savedSnap.exists()) {
          myResponses[surveyId] = savedSnap.data();
        } else {
          myResponses[surveyId] = { ...payload, updatedAt: new Date() };
        }
        setResponseUi(surveyId, "Response saved successfully.", false);
      } catch (err) {
        console.error("Failed to save response:", err);
        setResponseUi(surveyId, "Could not save your response. Please try again.", true);
      } finally {
        savingSurveyId = null;
        renderSurveys();
      }
    }

    function renderSurveys() {
      const listEl = document.getElementById("surveyList");
      const filtered = allSurveys.filter((s) => {
        const status = normalizeStatus(s.status);
        const isOpen = status === "published" && s.allowResponses !== false;
        if (statusFilter === "open" && !isOpen) return false;
        if (statusFilter === "closed" && isOpen) return false;
        if (!searchText) return true;
        const qTexts = getQuestions(s.questionsRaw, s.questions).map((q) => q.text).join(" ");
        const haystack = [s.title || "", stripHtml(s.body || ""), s.questionsRaw || "", qTexts].join(" ").toLowerCase();
        return haystack.includes(searchText);
      });

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty">No shared surveys found.</div>';
        return;
      }

      listEl.innerHTML = filtered.map((s) => {
        const status = normalizeStatus(s.status);
        const isOpen = status === "published" && s.allowResponses !== false;
        const statusLabel = status === "closed" ? "Closed" : "Published";
        const badges = `
          <span class="badge ${isOpen ? "badge-open" : "badge-closed"}">${isOpen ? "Open for Response" : "Closed"}</span>
          <span class="badge badge-status">${statusLabel}</span>
        `;

        const questions = getQuestions(s.questionsRaw, s.questions);

        const questionsHtml = questions.length ? `<div class="questions-wrap">
          <div class="questions-title">Questions (${questions.length})</div>
          <ol class="questions-list">${questions.map((q) => {
            let chip = "";
            if (q.type === "multiple_choice") chip = `<span class="q-type-chip q-type-chip-mc">Multiple Choice</span>`;
            else if (q.type === "rating") chip = `<span class="q-type-chip q-type-chip-rating">Rating 1–${q.scale || 5}</span>`;
            else if (q.type === "likert") chip = `<span class="q-type-chip q-type-chip-likert">Likert</span>`;
            return `<li>${esc(q.text)}${chip}</li>`;
          }).join("")}</ol>
        </div>` : "";

        const plats = Array.isArray(s.platforms) ? s.platforms : [];
        const chip = (enabled, cls, label) => `<span class="chip ${enabled ? cls : "chip-off"}">${label}</span>`;
        const platformChips = `
          ${chip(plats.includes("centralhub"), "chip-on-central", "CentralHub")}
          ${chip(plats.includes("academichub"), "chip-on-academic", "Academic Hub")}
          ${chip(plats.includes("teachershub"), "chip-on-teachers", "Teachers Hub")}
        `;

        const response = myResponses[s.id] || null;
        const savedAnswers = normalizeAnswers(response?.answers, questions.length);
        const responseUi = responseUiState[s.id];
        const noteClass = responseUi ? (responseUi.isError ? "response-note err" : "response-note ok") : "response-note";
        const defaultNote = response
          ? `Last saved: ${formatDateTime(response.updatedAt || response.createdAt)}`
          : (isOpen ? "You have not submitted a response yet." : "This survey is closed for responses.");

        let lastGroup = null;
        const responseInputs = questions.map((q, idx) => {
          let sectionHdr = "";
          if (q.group && q.group !== lastGroup) {
            lastGroup = q.group;
            sectionHdr = `<div class="response-section-header">${esc(q.group)}</div>`;
          }
          const savedVal = savedAnswers[idx] || "";
          const dis = !isOpen ? "disabled" : "";
          let inputHtml = "";

          if (q.type === "multiple_choice" && q.options && q.options.length) {
            const opts = q.options.map((opt, oi) => {
              const optId = `resp-${s.id}-${idx}-mc-${oi}`;
              const checked = savedVal === opt ? "checked" : "";
              return `<label class="${dis ? "disabled-label" : ""}">
                <input type="radio" id="${optId}" name="resp-${s.id}-${idx}" value="${esc(opt)}" ${checked} ${dis}>
                ${String.fromCharCode(65 + oi)}. ${esc(opt)}
              </label>`;
            }).join("");
            inputHtml = `<div class="response-mc">${opts}</div>`;

          } else if (q.type === "rating") {
            const scale = q.scale || 5;
            const stars = Array.from({ length: scale }, (_, i) => scale - i).map((n) => {
              const starId = `resp-${s.id}-${idx}-star-${n}`;
              const checked = savedVal === String(n) ? "checked" : "";
              return `<input type="radio" id="${starId}" name="resp-${s.id}-${idx}" value="${n}" ${checked} ${dis}><label for="${starId}" title="${n} star${n > 1 ? "s" : ""}">★</label>`;
            }).join("");
            const selLabel = savedVal ? ` · Selected: ${savedVal}/${scale}` : "";
            inputHtml = `<div class="response-rating${dis ? " rating-disabled" : ""}">${stars}</div>
              <div style="font-size:0.75rem;color:var(--ink-3);margin-top:3px;">1 = lowest · ${scale} = highest${selLabel}</div>`;

          } else if (q.type === "likert") {
            const opts = LIKERT_LABELS.map((lbl, li) => {
              const lid = `resp-${s.id}-${idx}-lik-${li}`;
              const checked = savedVal === lbl ? "checked" : "";
              return `<div class="likert-opt">
                <input type="radio" id="${lid}" name="resp-${s.id}-${idx}" value="${lbl}" ${checked} ${dis}>
                <label for="${lid}">${lbl}</label>
              </div>`;
            }).join("");
            inputHtml = `<div class="response-likert${dis ? " likert-disabled" : ""}">${opts}</div>`;

          } else {
            inputHtml = `<textarea
              id="resp-${s.id}-${idx}"
              class="response-input"
              data-survey-id="${s.id}"
              data-qidx="${idx}"
              placeholder="Write your response..."
              ${dis}
            >${esc(savedVal)}</textarea>`;
          }

          const labelFor = (!q.type || q.type === "text") ? `for="resp-${s.id}-${idx}"` : "";
          return `${sectionHdr}<div class="response-item">
            <label class="response-label" ${labelFor}>Q${idx + 1}: ${esc(q.text)}</label>
            ${inputHtml}
          </div>`;
        }).join("");

        const responseSection = questions.length ? `
          <div class="response-wrap">
            <div class="response-title">Your Response</div>
            ${responseInputs}
            <div class="response-actions">
              <button type="button" class="response-btn" data-survey-id="${s.id}" ${!isOpen || savingSurveyId === s.id ? "disabled" : ""}>
                ${savingSurveyId === s.id ? "Saving..." : (response ? "Update Response" : "Submit Response")}
              </button>
              <span class="${noteClass}">${esc(responseUi?.text || defaultNote)}</span>
            </div>
          </div>
        ` : "";

        return `
          <article class="survey-card">
            <div class="survey-head">
              <h2 class="survey-title">${esc(s.title || "Untitled Survey")}</h2>
              <div class="badge-row">${badges}</div>
            </div>
            <div class="survey-body">${renderBody(s.body || "")}</div>
            ${questionsHtml}
            <div class="platforms">${platformChips}</div>
            ${responseSection}
            <div class="survey-meta">${esc(s.author || "Admin")} &middot; ${formatDate(s.createdAt)}</div>
          </article>
        `;
      }).join("");
    }

    function buildResponseDocId(surveyId, uid) {
      return `${surveyId}__${uid}__${PLATFORM_KEY}`;
    }

    function setResponseUi(surveyId, text, isError) {
      if (!text) {
        delete responseUiState[surveyId];
        return;
      }
      responseUiState[surveyId] = { text, isError };
    }

    function normalizeStatus(value) {
      const status = String(value || "published").toLowerCase();
      if (status === "closed") return "closed";
      if (status === "draft") return "draft";
      return "published";
    }

    function getQuestions(raw, arr) {
      if (Array.isArray(arr) && arr.length) {
        return arr.map((q) => {
          if (typeof q === "string") return { type: "text", text: q.trim(), options: [], scale: 5, group: null };
          return { type: q.type || "text", text: (q.text || "").trim(), options: q.options || [], scale: q.scale || 5, group: q.group || null };
        }).filter((q) => q.text);
      }
      return String(raw || "").split(/\r?\n/).map((t) => t.trim()).filter(Boolean)
        .map((t) => ({ type: "text", text: t, options: [], scale: 5, group: null }));
    }

    function sanitizeHtml(html) {
      const tmp = document.createElement("div");
      tmp.innerHTML = html;
      tmp.querySelectorAll("script,style,iframe,object,embed,form,input,textarea,button,link,meta").forEach((el) => el.remove());
      tmp.querySelectorAll("*").forEach((el) => {
        [...el.attributes].forEach((attr) => {
          if (attr.name.startsWith("on") || attr.name === "action") el.removeAttribute(attr.name);
          if ((attr.name === "href" || attr.name === "src") && /^javascript:/i.test(attr.value)) el.removeAttribute(attr.name);
        });
      });
      return tmp.innerHTML;
    }

    function stripHtml(html) {
      const tmp = document.createElement("div");
      tmp.innerHTML = html;
      return tmp.textContent || "";
    }

    function renderBody(body) {
      if (!body) return "";
      if (/<[a-z][\s\S]*>/i.test(body)) return sanitizeHtml(body);
      return esc(body).replace(/\n/g, "<br>");
    }

    function formatDate(timestamp) {
      const d = timestamp?.toDate?.();
      if (!d) return "Unknown date";
      return d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
    }

    function formatDateTime(timestamp) {
      const d = timestamp?.toDate?.();
      if (!d) return "just now";
      return d.toLocaleString("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function normalizeAnswers(answers, expectedLength) {
      const arr = Array.isArray(answers) ? answers : [];
      return Array.from({ length: expectedLength }, (_, idx) => String(arr[idx] || "").trim());
    }

    function esc(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
